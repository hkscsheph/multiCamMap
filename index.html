<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Sensor Fusion: MJPEG IP Cameras</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <!-- YOLOv8 logic will be handled via graph model loading -->
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f0f0f;
            color: #eee;
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
        }

        #mapCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            background: #1a1a1a;
            cursor: crosshair;
        }

        .ui-overlay {
            position: absolute;
            top: 0;
            right: 0;
            width: 350px;
            height: 100vh;
            z-index: 10;
            background: rgba(20, 20, 20, 0.95);
            border-left: 2px solid #333;
            transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            backdrop-filter: blur(10px);
            overflow: visible;
        }

        /* Full height scrollable container */
        .sidebar-content {
            height: 100vh;
            overflow-y: auto;
            scrollbar-width: none; /* Firefox */
            -ms-overflow-style: none;  /* IE and Edge */
        }

        .sidebar-content::-webkit-scrollbar {
            display: none; /* Chrome, Safari and Opera */
        }

        .ui-overlay.hidden {
            transform: translateX(calc(100% - 2px)); 
        }

        .toggle-handle {
            position: absolute;
            top: 50%;
            left: -30px; /* Position on the left edge of the sidebar */
            transform: translateY(-50%);
            background: #27ae60;
            color: #fff;
            padding: 30px 8px;
            border-radius: 10px 0 0 10px;
            cursor: pointer;
            font-size: 16px;
            border: none;
            z-index: 100;
            box-shadow: -4px 0 15px rgba(0,0,0,0.6);
            line-height: 1;
        }

        .feeds-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding: 15px;
        }

        .video-box {
            position: relative;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid #333;
            width: 100%;
            aspect-ratio: 16 / 9;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
            font-size: 11px;
        }

        .video-box .no-signal {
            position: absolute;
            z-index: 5;
            pointer-events: none;
        }

        .video-box.active .no-signal {
            display: none;
        }

        img.stream-source,
        canvas.overlay {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            object-fit: contain;
        }

        img.stream-source {
            object-fit: contain;
        }

        canvas.overlay {
            pointer-events: auto;
            z-index: 10;
        }

        .video-box.calibrating {
            border: 4px solid #f39c12;
            box-shadow: 0 0 20px rgba(243, 156, 18, 0.5);
        }

        .panel {
            background: transparent;
            padding: 15px;
        }

        .status {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 5;
            padding: 8px 15px;
            border-radius: 20px;
            background: rgba(0,0,0,0.8);
            border: 1px solid #444;
            font-size: 0.85em;
            pointer-events: none;
        }

        .config-bar {
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
        }

        button {
            padding: 8px 16px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
            font-size: 12px;
        }

        button:hover {
            background: #2ecc71;
        }

        textarea {
            width: 300px;
            height: 60px;
            background: #050505;
            color: #00ff41;
            border: 1px solid #333;
            font-family: monospace;
            font-size: 10px;
            padding: 5px;
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 5;
            opacity: 0.7;
        }

        h3 {
            margin: 0;
            font-size: 1.1em;
            color: #aaa;
        }

        .cam-legend {
            position: absolute;
            bottom: 100px;
            left: 20px;
            z-index: 5;
            display: flex;
            flex-direction: column;
            gap: 5px;
            background: rgba(0,0,0,0.6);
            padding: 10px;
            border-radius: 8px;
            font-size: 11px;
        }
    </style>
</head>

<body>

    <canvas id="mapCanvas"></canvas>

    <div class="status" id="status">📡 System: Loading AI Core...</div>
    
    <div id="camLegend" class="cam-legend">
        <!-- Dynamic legend -->
    </div>

    

    <div id="uiOverlay" class="ui-overlay">
        <button id="toggleBtn" class="toggle-handle">▶</button>
        
        <div class="sidebar-content">
            <div class="config-bar" style="flex-direction: column; align-items: stretch; gap: 10px;">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h3>Config</h3>
                    <div style="display: flex; align-items: center; gap: 5px;">
                        <button id="visibilityBtn" title="Toggle High Visibility" style="background: #7f8c8d; padding: 6px 10px; font-size: 11px;">🔆</button>
                        <button id="copyConfigBtn" style="background: #34495e; padding: 6px 10px; font-size: 11px;">📋</button>
                        <button id="importBtn" style="background: #e67e22; padding: 6px 10px; font-size: 11px;">📥</button>
                        <button id="addCamBtn" style="background: #3498db; padding: 6px 10px; font-size: 11px;">➕</button>
                    </div>
                </div>
                
                <div style="display: flex; justify-content: space-between; align-items: center; padding-top: 5px; border-top: 1px solid #333;">
                    <div style="display: flex; flex-direction: column; gap: 2px; flex: 1;">
                        <span style="font-size: 8px; color: #888;">AI ENGINE</span>
                        <select id="aiEngine" style="background: #000; color: #00ff41; border: 1px solid #444; font-size: 9px; padding: 2px; width: 95%;" onchange="switchAIEngine(this.value)">
                            <option value="cocossd">COCO-SSD</option>
                            <option value="yolov8">YOLOv8 Nano</option>
                        </select>
                    </div>
                    <div style="display: flex; flex-direction: column; gap: 2px; flex: 1;">
                        <span style="font-size: 8px; color: #888;">PRECISION</span>
                        <input type="range" min="0.01" max="0.2" step="0.01" value="0.05" style="width: 95%; height: 4px;" 
                            oninput="triangulationTolerance = parseFloat(this.value)">
                    </div>
                </div>
            </div>

            <div id="camList" style="padding: 15px; display: flex; flex-direction: column; gap: 20px;">
                <!-- Each camera's config + feed will appear here -->
            </div>
        </div>
    </div>

    <script>
        let model;
        let isDragging = false;
        let selectedCam = null;
        let calibrationMode = null; 
        let highVisibilityMode = false;
        let triangulationTolerance = 0.05;
        
        const mapImg = new Image();
        mapImg.src = 'bigCompRm.webp';
        
        const INTERSECT_THRESHOLD = 40;
        const CAM_COLORS = ['#007bff', '#ff4757', '#9b59b6', '#2ecc71', '#f1c40f', '#e67e22', '#1abc9c', '#e74c3c'];
        
        let cameras = [];
        const videoStreams = {}; 

        const mCanvas = document.getElementById('mapCanvas');
        const mCtx = mCanvas.getContext('2d');
        const configOutput = document.getElementById('configOutput');
        const camConfigs = document.getElementById('camConfigs');
        const feedsContainer = document.getElementById('feedsContainer');
        const camLegend = document.getElementById('camLegend');
        const uiOverlay = document.getElementById('uiOverlay');
        const toggleBtn = document.getElementById('toggleBtn');
        const visibilityBtn = document.getElementById('visibilityBtn');

        // Toggle UI
        toggleBtn.onclick = () => {
            uiOverlay.classList.toggle('hidden');
            toggleBtn.innerText = uiOverlay.classList.contains('hidden') ? '◀' : '▶';
        };

        visibilityBtn.onclick = () => {
            highVisibilityMode = !highVisibilityMode;
            visibilityBtn.style.background = highVisibilityMode ? '#f1c40f' : '#7f8c8d';
        };

        // Resize map to viewport
        function resizeMap() {
            mCanvas.width = window.innerWidth;
            mCanvas.height = window.innerHeight;
        }
        window.onresize = resizeMap;
        resizeMap();

        // 1. Setup AI
        let currentEngine = 'cocossd';
        let cocoModel;
        let yoloModel;
        const YOLO_URL = 'https://cdn.jsdelivr.net/gh/Hyuto/yolov8-tfjs@master/public/yolov8n_web_model/model.json';
        
        async function initAI() {
            try {
                cocoModel = await cocoSsd.load();
                model = cocoModel;
                document.getElementById('status').innerText = "✅ COCO-SSD Ready.";
            } catch (err) {
                document.getElementById('status').innerText = "❌ AI Load Error.";
            }
        }
        initAI();

        async function switchAIEngine(engine) {
            document.getElementById('status').innerText = `📡 Switching to ${engine.toUpperCase()}...`;
            
            if (engine === 'yolov8') {
                if (!yoloModel) {
                    try {
                        yoloModel = await tf.loadGraphModel(YOLO_URL);
                    } catch (err) {
                        document.getElementById('status').innerText = "❌ YOLOv8 Load Error.";
                        return;
                    }
                }
                model = yoloModel;
            } else {
                model = cocoModel;
            }
            
            currentEngine = engine; // Update state ONLY after model is ready
            document.getElementById('status').innerText = `✅ ${engine.toUpperCase()} Active.`;
        }

        async function detectPeople(inputElement) {
            if (!model) return [];

            if (currentEngine === 'cocossd') {
                if (typeof model.detect !== 'function') return []; // Safety check
                const tensor = tf.browser.fromPixels(inputElement);
                const predictions = await model.detect(tensor);
                tensor.dispose();
                return predictions.filter(p => p.class === 'person');
            } else {
                if (typeof model.predict !== 'function') return []; // Safety check
                const [width, height] = [inputElement.naturalWidth || inputElement.videoWidth, inputElement.naturalHeight || inputElement.videoHeight];
                if (!width || !height) return [];

                return tf.tidy(() => {
                    const img = tf.browser.fromPixels(inputElement);
                    const resized = tf.image.resizeBilinear(img, [640, 640]);
                    const normalized = resized.div(255.0).expandDims(0);
                    const output = model.predict(normalized);
                    const raw = output.squeeze([0]);
                    const transposed = raw.transpose();
                    const boxes = transposed.slice([0, 0], [-1, 4]);
                    const scores = transposed.slice([0, 4], [-1, 80]);
                    const personScores = scores.slice([0, 0], [-1, 1]).squeeze();
                    const filteredIndices = tf.image.nonMaxSuppression(boxes, personScores, 10, 0.45, 0.4).arraySync();
                    const boxArr = boxes.arraySync();
                    const scoreArr = personScores.arraySync();

                    return filteredIndices.map(idx => {
                        const [cx, cy, w, h] = boxArr[idx];
                        return {
                            bbox: [(cx - w / 2) * (width / 640), (cy - h / 2) * (height / 640), w * (width / 640), h * (height / 640)],
                            score: scoreArr[idx],
                            class: 'person'
                        };
                    });
                });
            }
        }

        async function processCamera(imgElement, canvas, camObj) {
            if (!imgElement.complete || imgElement.naturalWidth === 0 || !camObj.active) {
                requestAnimationFrame(() => processCamera(imgElement, canvas, camObj));
                return;
            }
            const predictions = await detectPeople(imgElement);
            handlePredictions(predictions, canvas, imgElement.naturalWidth, imgElement.naturalHeight, camObj);
            requestAnimationFrame(() => processCamera(imgElement, canvas, camObj));
        }

        async function processWebcamCamera(videoElement, canvas, camObj) {
            if (videoElement.readyState !== videoElement.HAVE_ENOUGH_DATA || !camObj.active) {
                requestAnimationFrame(() => processWebcamCamera(videoElement, canvas, camObj));
                return;
            }
            const predictions = await detectPeople(videoElement);
            handlePredictions(predictions, canvas, videoElement.videoWidth, videoElement.videoHeight, camObj);
            requestAnimationFrame(() => processWebcamCamera(videoElement, canvas, camObj));
        }

        function addCamera() {
            const id = cameras.length > 0 ? Math.max(...cameras.map(c => c.id)) + 1 : 1;
            const color = CAM_COLORS[(id - 1) % CAM_COLORS.length];
            
            const newCam = {
                id,
                x: window.innerWidth / 2 + (id * 40 - 80),
                y: window.innerHeight / 2 + (id * 40 - 80),
                angle: 45,
                fov: 60,
                color,
                detections: [],
                sourceType: 'webcam',
                deviceId: '',
                streamUrl: '',
                active: false
            };
            
            cameras.push(newCam);
            renderCamUI(newCam);
            updateCamSource(id);
            updateLegend();
            updateConfigOutput();
        }

        function renderCamUI(cam) {
            const camWrapper = document.createElement('div');
            camWrapper.id = `camWrapper${cam.id}`;
            camWrapper.style.background = 'rgba(255,255,255,0.05)';
            camWrapper.style.padding = '12px';
            camWrapper.style.borderRadius = '8px';
            camWrapper.style.display = 'flex';
            camWrapper.style.flexDirection = 'column';
            camWrapper.style.gap = '10px';

            const card = document.createElement('div');
            card.id = `camCard${cam.id}`;
            card.innerHTML = `
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                    <label style="font-weight: bold; color: ${cam.color}; font-size: 13px;">Camera ${cam.id}</label>
                    <button onclick="removeCamera(${cam.id})" style="padding: 2px 8px; background: #c0392b; font-size: 14px;">⛔</button>
                </div>
                <select id="sourceType${cam.id}" onchange="updateCamSource(${cam.id})"
                    style="width: 100%; padding: 5px; background: #000; color: #00ff41; border: 1px solid #444; font-size: 11px;">
                    <option value="webcam" ${cam.sourceType === 'webcam' ? 'selected' : ''}>Webcam</option>
                    <option value="mjpeg" ${cam.sourceType === 'mjpeg' ? 'selected' : ''}>IP Camera (MJPEG)</option>
                    <option value="rtsp" ${cam.sourceType === 'rtsp' ? 'selected' : ''}>IP Camera (RTSP)</option>
                    <option value="screenshare" ${cam.sourceType === 'screenshare' ? 'selected' : ''}>Screen</option>
                </select>
                <input id="urlInput${cam.id}" type="text" placeholder="URL" value="${cam.streamUrl || ''}"
                    style="display: ${['mjpeg', 'rtsp'].includes(cam.sourceType) ? 'block' : 'none'}; width: 100%; padding: 5px; margin-top: 5px; background: #000; color: #00ff41; border: 1px solid #444; font-size: 11px;"
                    onchange="updateCamUrl(${cam.id}, this.value)" />
                <select id="deviceSelector${cam.id}" 
                    style="display: ${cam.sourceType === 'webcam' ? 'block' : 'none'}; width: 100%; padding: 5px; margin-top: 5px; background: #000; color: #00ff41; border: 1px solid #444; font-size: 11px;"
                    onchange="updateCamDeviceId(${cam.id}, this.value)">
                </select>
                <div style="margin: 8px 0;">
                    <div style="display:flex; justify-content:space-between; font-size: 10px; color: #888;">
                        <span>FOV</span><span id="fovVal${cam.id}">${cam.fov}°</span>
                    </div>
                    <input id="fovRange${cam.id}" type="range" min="30" max="120" value="${cam.fov}" style="width: 100%; height: 4px;" 
                        oninput="updateCamFOV(${cam.id}, this.value)">
                </div>
                <div style="margin: 8px 0;">
                    <div style="display:flex; justify-content:space-between; font-size: 10px; color: #888;">
                        <span>ANGLE</span><span id="angleVal${cam.id}">${Math.round(cam.angle)}°</span>
                    </div>
                    <input id="angleRange${cam.id}" type="range" min="0" max="360" value="${cam.angle}" style="width: 100%; height: 4px;" 
                        oninput="updateCamAngle(${cam.id}, this.value)">
                </div>
                <div style="display: flex; gap: 5px;">
                    <button onclick="connectSingle(${cam.id})" style="flex: 1; padding: 4px; font-size: 10px; background: #27ae60;">CONNECT</button>
                    <button id="calibBtn${cam.id}" onclick="startCalibration(${cam.id})" style="flex: 1; padding: 4px; font-size: 10px; background: #f39c12;">CALIB</button>
                    <button onclick="startAutoCalibration(${cam.id})" style="flex: 1; padding: 4px; font-size: 10px; background: #8e44ad;">AUTO</button>
                </div>
            `;
            camWrapper.appendChild(card);

            const feedBox = document.createElement('div');
            feedBox.className = 'video-box';
            feedBox.id = `feedBox${cam.id}`;
            feedBox.innerHTML = `
                <div class="no-signal">Cam ${cam.id}</div>
                <img id="stream${cam.id}" class="stream-source" crossorigin="anonymous" style="display:none" />
                <canvas id="overlay${cam.id}" class="overlay" onclick="handleFeedClick(${cam.id}, event)"></canvas>
            `;
            camWrapper.appendChild(feedBox);
            
            document.getElementById('camList').appendChild(camWrapper);
            
            // Initial source setup
            if (cam.sourceType === 'webcam') populateDeviceSelector(cam.id);
        }

        function removeCamera(id) {
            cameras = cameras.filter(c => c.id !== id);
            document.getElementById(`camWrapper${id}`).remove();
            if (videoStreams[id]) {
                videoStreams[id].getTracks().forEach(t => t.stop());
                delete videoStreams[id];
            }
            updateLegend();
            updateConfigOutput();
        }

        function updateCamSource(id) {
            const cam = cameras.find(c => c.id === id);
            const sourceType = document.getElementById(`sourceType${id}`).value;
            cam.sourceType = sourceType;
            document.getElementById(`urlInput${id}`).style.display = ['mjpeg', 'rtsp'].includes(sourceType) ? 'block' : 'none';
            
            const deviceSelector = document.getElementById(`deviceSelector${id}`);
            if (deviceSelector) {
                deviceSelector.style.display = sourceType === 'webcam' ? 'block' : 'none';
                if (sourceType === 'webcam') populateDeviceSelector(id);
            }
        }

        function updateCamDeviceId(id, deviceId) {
            const cam = cameras.find(c => c.id === id);
            cam.deviceId = deviceId;
        }

        async function populateDeviceSelector(id) {
            const cam = cameras.find(c => c.id === id);
            const selector = document.getElementById(`deviceSelector${id}`);
            if (!selector) return;

            try {
                const devices = await navigator.mediaDevices.enumerateDevices();
                const videoDevices = devices.filter(device => device.kind === 'videoinput');
                
                selector.innerHTML = videoDevices.map(device => 
                    `<option value="${device.deviceId}" ${cam.deviceId === device.deviceId ? 'selected' : ''}>${device.label || `Camera ${device.deviceId.slice(0, 5)}...`}</option>`
                ).join('');
                
                if (videoDevices.length > 0 && !cam.deviceId) {
                    cam.deviceId = selector.value;
                }
            } catch (err) {
                console.error("Error enumerating devices:", err);
            }
        }

        function updateCamUrl(id, url) {
            const cam = cameras.find(c => c.id === id);
            cam.streamUrl = url;
        }

        function updateCamFOV(id, val) {
            const cam = cameras.find(c => c.id === id);
            cam.fov = parseInt(val);
            document.getElementById(`fovVal${id}`).innerText = val;
            updateConfigOutput();
        }

        function updateCamAngle(id, val) {
            const cam = cameras.find(c => c.id === id);
            cam.angle = parseInt(val);
            document.getElementById(`angleVal${id}`).innerText = val + '°';
            updateConfigOutput();
        }

        function updateLegend() {
            camLegend.innerHTML = cameras.map(cam => `
                <span style="color: ${cam.color};">● Cam ${cam.id}</span>
            `).join('');
        }

        async function connectSingle(id) {
            const cam = cameras.find(c => c.id === id);
            const imgElement = document.getElementById(`stream${id}`);
            const canvas = document.getElementById(`overlay${id}`);
            const videoBox = document.getElementById(`feedBox${id}`);

            try {
                if (cam.sourceType === 'mjpeg' || cam.sourceType === 'rtsp') {
                    if (!cam.streamUrl) return alert("Enter URL");
                    
                    // For RTSP, we assume a local proxy will handle it and return MJPEG
                    // or the user provides a URL that is already a proxy.
                    // If the URL starts with rtsp://, we try to use our local proxy.
                    if (cam.sourceType === 'rtsp' && cam.streamUrl.startsWith('rtsp://')) {
                        imgElement.src = `http://localhost:3000/rtsp-proxy?url=${encodeURIComponent(cam.streamUrl)}`;
                    } else {
                        imgElement.src = cam.streamUrl;
                    }
                    
                    imgElement.style.display = 'block';
                    videoBox.classList.add('active');
                    processCamera(imgElement, canvas, cam);
                } else if (cam.sourceType === 'webcam') {
                    const constraints = {
                        video: cam.deviceId ? { deviceId: { exact: cam.deviceId } } : true
                    };
                    const stream = await navigator.mediaDevices.getUserMedia(constraints);
                    const video = document.createElement('video');
                    video.srcObject = stream;
                    video.muted = true; // Essential for autoplay in many browsers
                    video.setAttribute('playsinline', ''); 
                    video.style.width = '100%';
                    video.style.height = '100%';
                    video.style.objectFit = 'contain';
                    
                    // Clear previous and append
                    videoBox.querySelectorAll('video').forEach(v => v.remove());
                    videoBox.appendChild(video);
                    
                    video.play();
                    videoStreams[id] = stream;
                    imgElement.style.display = 'none';
                    videoBox.classList.add('active');
                    processWebcamCamera(video, canvas, cam);
                } else if (cam.sourceType === 'screenshare') {
                    const stream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                    const video = document.createElement('video');
                    video.srcObject = stream;
                    video.style.width = '100%';
                    video.style.height = '100%';
                    video.style.objectFit = 'contain';
                    
                    videoBox.querySelectorAll('video').forEach(v => v.remove());
                    videoBox.appendChild(video);
                    
                    video.play();
                    videoStreams[id] = stream;
                    imgElement.style.display = 'none';
                    videoBox.classList.add('active');
                    processWebcamCamera(video, canvas, cam);
                }
                cam.active = true;
                document.getElementById('status').innerText = `✅ Cam ${id} Active`;
            } catch (err) {
                document.getElementById('status').innerText = `❌ Error: ${err.message}`;
            }
        }

        function handlePredictions(predictions, canvas, width, height, camObj) {
            const container = canvas.parentElement;
            const cw = container.clientWidth;
            const ch = container.clientHeight;

            // 1. Match internal resolution to displayed CSS pixels
            if (canvas.width !== cw || canvas.height !== ch) {
                canvas.width = cw;
                canvas.height = ch;
            }
            
            // 2. Ensure canvas covers the container
            canvas.style.width = '100%';
            canvas.style.height = '100%';
            canvas.style.top = '0';
            canvas.style.left = '0';

            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, cw, ch);

            // 3. Calculate 'contain' mapping scale and offsets
            const containerRatio = cw / ch;
            const contentRatio = width / height;
            let scale, offsetX, offsetY;

            if (contentRatio > containerRatio) {
                scale = cw / width;
                offsetX = 0;
                offsetY = (ch - height * scale) / 2;
            } else {
                scale = ch / height;
                offsetY = 0;
                offsetX = (cw - width * scale) / 2;
            }

            ctx.lineWidth = 2;
            const camFOVRad = (camObj.fov || 60) * Math.PI / 180;
            camObj.detections = [];

            predictions.forEach(p => {
                if (p.class === 'person' && p.score > 0.5) {
                    const [x, y, w, h] = p.bbox;
                    ctx.strokeStyle = camObj.color;
                    
                    // 4. Map natural AI coordinates to display pixels
                    ctx.strokeRect(
                        offsetX + x * scale,
                        offsetY + y * scale,
                        w * scale,
                        h * scale
                    );

                    const personCenterX = x + w / 2;
                    const offsetAngle = (personCenterX / width - 0.5) * camFOVRad;
                    const camAngleRad = camObj.angle * Math.PI / 180;
                    camObj.detections.push({ angle: camAngleRad + offsetAngle });
                }
            });
        }

        function isPointInFOV(cam, p) {
            const angleToPoint = Math.atan2(p.y - cam.y, p.x - cam.x) * 180 / Math.PI;
            let diff = (angleToPoint - cam.angle + 180 + 360) % 360 - 180;
            return Math.abs(diff) <= (cam.fov / 2);
        }

        function doesCamSeePoint(cam, p) {
            const angleToPoint = Math.atan2(p.y - cam.y, p.x - cam.x);
            return cam.detections.some(det => {
                let diff = (det.angle - angleToPoint + Math.PI + 4 * Math.PI) % (2 * Math.PI) - Math.PI;
                return Math.abs(diff) < triangulationTolerance; 
            });
        }

        function getIntersection(cam1, det1, cam2, det2) {
            const x1 = cam1.x, y1 = cam1.y, a1 = det1.angle;
            const x2 = cam2.x, y2 = cam2.y, a2 = det2.angle;
            const dx = x2 - x1, dy = y2 - y1;
            const det = Math.cos(a1) * Math.sin(a2) - Math.sin(a1) * Math.cos(a2);
            if (Math.abs(det) < 0.001) return null;
            const t1 = (dx * Math.sin(a2) - dy * Math.cos(a2)) / det;
            const t2 = (dx * Math.sin(a1) - dy * Math.cos(a1)) / det;
            if (t1 > 0 && t2 > 0) return { x: x1 + t1 * Math.cos(a1), y: y1 + t1 * Math.sin(a1) };
            return null;
        }

        function drawMap() {
            mCtx.clearRect(0, 0, mCanvas.width, mCanvas.height);
            
            // Draw background image (Full Width)
            if (mapImg.complete && mapImg.naturalWidth > 0) {
                const imgRatio = mapImg.naturalHeight / mapImg.naturalWidth;
                const drawWidth = mCanvas.width;
                const drawHeight = drawWidth * imgRatio;
                mCtx.drawImage(mapImg, 0, 0, drawWidth, drawHeight);
                
                // Dim the image slightly for better visibility of overlays
                mCtx.fillStyle = 'rgba(0,0,0,0.3)';
                mCtx.fillRect(0, 0, drawWidth, drawHeight);
            }

            // Grid (optional, keep it subtle)
            mCtx.strokeStyle = 'rgba(255,255,255,0.05)'; mCtx.lineWidth = 1;
            for (let i = 0; i < mCanvas.width; i += 100) {
                mCtx.beginPath(); mCtx.moveTo(i, 0); mCtx.lineTo(i, mCanvas.height); mCtx.stroke();
            }
            for (let i = 0; i < mCanvas.height; i += 100) {
                mCtx.beginPath(); mCtx.moveTo(0, i); mCtx.lineTo(mCanvas.width, i); mCtx.stroke();
            }

            // Rays
            cameras.forEach(cam => {
                cam.detections.forEach(det => {
                    mCtx.beginPath(); mCtx.moveTo(cam.x, cam.y);
                    mCtx.lineTo(cam.x + 2000 * Math.cos(det.angle), cam.y + 2000 * Math.sin(det.angle));
                    mCtx.strokeStyle = cam.color + (highVisibilityMode ? '' : '33'); 
                    mCtx.lineWidth = highVisibilityMode ? 2 : 1;
                    mCtx.stroke();
                });
            });

            // Triangulation (Optimized: Competitive Greedy Matching)
            const candidates = [];
            const activeCams = cameras.filter(c => c.detections.length > 0 && c.active);
            
            if (activeCams.length >= 2) {
                for (let i = 0; i < activeCams.length; i++) {
                    for (let j = i + 1; j < activeCams.length; j++) {
                        const cam1 = activeCams[i];
                        const cam2 = activeCams[j];
                        
                        cam1.detections.forEach((d1, d1Idx) => {
                            cam2.detections.forEach((d2, d2Idx) => {
                                const p = getIntersection(cam1, d1, cam2, d2);
                                if (p) {
                                    // 1. Check if all cameras covering this point also see it
                                    const seeingCams = [];
                                    let allCoveringSee = true;
                                    
                                    cameras.forEach(cam => {
                                        if (isPointInFOV(cam, p)) {
                                            const angleToPoint = Math.atan2(p.y - cam.y, p.x - cam.x);
                                            const matchingDetIdx = cam.detections.findIndex(det => {
                                                let diff = (det.angle - angleToPoint + Math.PI + 4 * Math.PI) % (2 * Math.PI) - Math.PI;
                                                return Math.abs(diff) < triangulationTolerance;
                                            });
                                            
                                            if (matchingDetIdx !== -1) {
                                                seeingCams.push({ camId: cam.id, detIdx: matchingDetIdx });
                                            } else {
                                                allCoveringSee = false;
                                            }
                                        }
                                    });

                                    if (allCoveringSee && seeingCams.length >= 2) {
                                        candidates.push({
                                            pos: p,
                                            score: seeingCams.length,
                                            contributingRays: seeingCams
                                        });
                                    }
                                }
                            });
                        });
                    }
                }
            }

            // Greedy selection: highest score first, consume rays
            const targets = [];
            const consumedRays = new Set(); // Format: "camId-detIdx"

            candidates.sort((a, b) => b.score - a.score);

            candidates.forEach(cand => {
                // Check if any contributing ray is already used
                const isAvailable = cand.contributingRays.every(ray => 
                    !consumedRays.has(`${ray.camId}-${ray.detIdx}`)
                );

                if (isAvailable) {
                    targets.push(cand.pos);
                    // Consume all rays that can see this point
                    cand.contributingRays.forEach(ray => {
                        consumedRays.add(`${ray.camId}-${ray.detIdx}`);
                    });
                }
            });

            targets.forEach((p, idx) => {
                const isDuplicate = targets.slice(0, idx).some(prev => Math.hypot(p.x - prev.x, p.y - prev.y) < 30);
                if (!isDuplicate) {
                    if (highVisibilityMode) {
                        mCtx.fillStyle = "rgba(0,0,0,0.9)";
                        mCtx.beginPath();
                        // mCtx.arc(p.x, p.y - 8, 20, 0, Math.PI * 2);
                        mCtx.fill();
                        mCtx.font = "36px Arial";
                    } else {
                        mCtx.font = "24px Arial";
                    }
                    mCtx.textAlign = "center";
                    mCtx.fillText("🐟", p.x, p.y);
                }
            });

            // Draw Cameras
            cameras.forEach(cam => {
                const camFOVRad = (cam.fov || 60) * Math.PI / 180;
                mCtx.save();
                mCtx.translate(cam.x, cam.y);
                mCtx.rotate(cam.angle * Math.PI / 180);
                mCtx.fillStyle = cam.color + (highVisibilityMode ? '66' : '15');
                mCtx.beginPath(); mCtx.moveTo(0,0); mCtx.arc(0, 0, 150, -camFOVRad/2, camFOVRad/2); mCtx.fill();
                if (highVisibilityMode) {
                    mCtx.strokeStyle = cam.color;
                    mCtx.lineWidth = 1;
                    mCtx.stroke();
                }
                mCtx.fillStyle = cam.color;
                mCtx.fillRect(-12, -8, 24, 16); mCtx.fillRect(12, -4, 5, 8);
                if (calibrationMode && calibrationMode.camId === cam.id) {
                    mCtx.strokeStyle = "#fff"; mCtx.lineWidth = 2; mCtx.strokeRect(-15, -11, 30, 22);
                }
                mCtx.restore();
            });

            requestAnimationFrame(drawMap);
        }

        // Calibration
        function startCalibration(id) {
            calibrationMode = { type: 'single', camId: id, step: 'video', pixelX: null };
            document.getElementById('status').innerText = `🎯 Calibration: Click object in Video ${id}`;
            document.getElementById(`feedBox${id}`).classList.add('calibrating');
        }

        function startAutoCalibration(id) {
            calibrationMode = { type: 'auto', camId: id, step: 'v1', v1: null, m1: null, v2: null, m2: null };
            document.getElementById('status').innerText = `🎯 Auto-Calib (1/2): Click object 1 in Video ${id}`;
            document.getElementById(`feedBox${id}`).classList.add('calibrating');
        }

        function stopCalibration(id) {
            calibrationMode = null;
            document.getElementById('status').innerText = "Calibration Done.";
            document.getElementById(`feedBox${id}`).classList.remove('calibrating');
        }

        function handleFeedClick(id, event) {
            if (!calibrationMode || calibrationMode.camId !== id) return;
            
            const pixelX = (event.clientX - event.target.getBoundingClientRect().left) / event.target.clientWidth;
            
            if (calibrationMode.type === 'single' && calibrationMode.step === 'video') {
                calibrationMode.pixelX = pixelX;
                calibrationMode.step = 'map';
                document.getElementById('status').innerText = `🎯 Calibration: Click object's REAL location on Map`;
            } else if (calibrationMode.type === 'auto') {
                if (calibrationMode.step === 'v1') {
                    calibrationMode.v1 = pixelX;
                    calibrationMode.step = 'm1';
                    document.getElementById('status').innerText = `🎯 Auto-Calib (1/2): Click object 1 on Map`;
                } else if (calibrationMode.step === 'v2') {
                    calibrationMode.v2 = pixelX;
                    calibrationMode.step = 'm2';
                    document.getElementById('status').innerText = `🎯 Auto-Calib (2/2): Click object 2 on Map`;
                }
            }
        }

        const getMouse = (e) => ({ x: e.clientX, y: e.clientY });

        function syncCamUI(cam) {
            const fovVal = document.getElementById(`fovVal${cam.id}`);
            const fovRange = document.getElementById(`fovRange${cam.id}`);
            const angleVal = document.getElementById(`angleVal${cam.id}`);
            const angleRange = document.getElementById(`angleRange${cam.id}`);
            
            if (fovVal) fovVal.innerText = `${Math.round(cam.fov)}°`;
            if (fovRange) fovRange.value = cam.fov;
            if (angleVal) angleVal.innerText = `${Math.round(cam.angle)}°`;
            if (angleRange) angleRange.value = cam.angle;
        }

        mCanvas.onmousedown = (e) => {
            const p = getMouse(e);
            
            if (calibrationMode && (calibrationMode.step === 'map' || calibrationMode.step === 'm1' || calibrationMode.step === 'm2')) {
                const cam = cameras.find(c => c.id === calibrationMode.camId);
                
                if (calibrationMode.step === 'map') {
                    const camFOVRad = (cam.fov || 60) * Math.PI / 180;
                    cam.angle = (Math.atan2(p.y - cam.y, p.x - cam.x) - (calibrationMode.pixelX - 0.5) * camFOVRad) * 180 / Math.PI;
                    cam.angle = (cam.angle + 360) % 360;
                    stopCalibration(cam.id);
                    syncCamUI(cam);
                } else if (calibrationMode.step === 'm1') {
                    calibrationMode.m1 = p;
                    calibrationMode.step = 'v2';
                    document.getElementById('status').innerText = `🎯 Auto-Calib (2/2): Click object 2 in Video ${cam.id}`;
                } else if (calibrationMode.step === 'm2') {
                    calibrationMode.m2 = p;
                    solveAutoCalibration(cam, calibrationMode);
                    stopCalibration(cam.id);
                    syncCamUI(cam);
                }
                updateConfigOutput();
                return;
            }
            cameras.forEach(cam => {
                if (Math.hypot(cam.x - p.x, cam.y - p.y) < 30) selectedCam = cam;
            });
            if (selectedCam) isDragging = true;
        };

        function solveAutoCalibration(cam, data) {
            const theta1 = Math.atan2(data.m1.y - cam.y, data.m1.x - cam.x);
            const theta2 = Math.atan2(data.m2.y - cam.y, data.m2.x - cam.x);
            
            let dTheta = theta2 - theta1;
            while (dTheta > Math.PI) dTheta -= 2 * Math.PI;
            while (dTheta < -Math.PI) dTheta += 2 * Math.PI;
            
            const dV = data.v2 - data.v1;
            
            if (Math.abs(dV) < 0.01) return alert("Objects too close in video");
            
            const fovRad = dTheta / dV;
            const fovDeg = Math.abs(fovRad * 180 / Math.PI);
            
            if (fovDeg < 10 || fovDeg > 180) {
                alert(`Warning: Calculated FOV (${Math.round(fovDeg)}°) is unusual. Check your points.`);
            }
            
            cam.fov = Math.max(10, Math.min(180, fovDeg));
            cam.angle = (theta1 - (data.v1 - 0.5) * (cam.fov * Math.PI / 180)) * 180 / Math.PI;
            
            // Normalize angle
            cam.angle = (cam.angle + 360) % 360;
        }

        mCanvas.onmousemove = (e) => {
            if (isDragging && selectedCam) {
                const p = getMouse(e);
                selectedCam.x = p.x; selectedCam.y = p.y;
            }
        };

        window.onmouseup = () => {
            if (isDragging) { isDragging = false; selectedCam = null; updateConfigOutput(); }
        };

        function updateConfigOutput() {
            // No longer needed as we use the copy button
        }

        document.getElementById('importBtn').onclick = () => {
            const json = prompt("Paste your camera config JSON here:");
            if (!json) return;
            try {
                const importedCams = JSON.parse(json);
                if (!Array.isArray(importedCams)) throw new Error("Invalid format");
                
                // Clear existing
                cameras.forEach(c => {
                    document.getElementById(`camCard${c.id}`)?.remove();
                    document.getElementById(`feedBox${c.id}`)?.remove();
                    if (videoStreams[c.id]) {
                        videoStreams[c.id].getTracks().forEach(t => t.stop());
                        delete videoStreams[c.id];
                    }
                });
                cameras = [];

                // Load new
                importedCams.forEach(c => {
                    const newCam = {
                        ...c,
                        detections: [],
                        active: false
                    };
                    cameras.push(newCam);
                    renderCamUI(newCam);
                });
                updateLegend();
                document.getElementById('status').innerText = "✅ Config Imported.";
            } catch (e) {
                alert("Error importing config: " + e.message);
            }
        };

        document.getElementById('copyConfigBtn').onclick = () => {
            const config = JSON.stringify(cameras.map(({ detections, active, ...rest }) => rest), null, 2);
            navigator.clipboard.writeText(config).then(() => {
                const originalText = document.getElementById('copyConfigBtn').innerText;
                document.getElementById('copyConfigBtn').innerText = '✅ COPIED!';
                setTimeout(() => {
                    document.getElementById('copyConfigBtn').innerText = originalText;
                }, 2000);
            });
        };

        document.getElementById('addCamBtn').onclick = addCamera;
        //document.getElementById('startBtn').onclick = () => cameras.forEach(c => connectSingle(c.id));

        addCamera();
        drawMap();
    </script>
</body>
</html>

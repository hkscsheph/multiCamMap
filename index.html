<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Sensor Fusion: MJPEG IP Cameras</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f0f0f;
            color: #eee;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .main-layout {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
            max-width: 1600px;
        }

        .feeds-container {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
        }

        .video-box {
            position: relative;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid #333;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
            font-size: 12px;
        }

        .video-box .no-signal {
            position: absolute;
            z-index: 5;
            pointer-events: none;
        }

        .video-box.active .no-signal {
            display: none;
        }

        /* 這裡將原本的 video 樣式改給 img 使用 */
        img.stream-source,
        canvas.overlay {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }

        img.stream-source {
            object-fit: cover;
        }

        canvas.overlay {
            pointer-events: none;
            z-index: 10;
        }

        .sidebar {
            flex: 0 0 380px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .panel {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #333;
        }

        #mapCanvas {
            background: #fff;
            border-radius: 8px;
            cursor: crosshair;
            width: 100%;
            height: auto;
        }

        .status {
            margin-bottom: 20px;
            padding: 10px 20px;
            border-radius: 30px;
            background: #222;
            border: 1px solid #444;
            font-size: 0.9em;
        }

        button {
            padding: 12px 24px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        button:hover {
            background: #2ecc71;
            transform: translateY(-2px);
        }

        textarea {
            width: 100%;
            height: 100px;
            background: #050505;
            color: #00ff41;
            border: 1px solid #333;
            font-family: monospace;
            font-size: 11px;
            padding: 8px;
            box-sizing: border-box;
            margin-top: 10px;
        }

        h3 {
            margin-top: 0;
            font-size: 1.1em;
            color: #aaa;
        }
    </style>
</head>

<body>

    <div class="status" id="status">📡 System: Loading AI Core...</div>

    <div class="panel" style="margin-bottom: 20px; max-width: 1600px;">
        <h3>Camera Source Configuration</h3>
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px;">
            <div id="cam1Config" class="cam-config">
                <label style="font-weight: bold; color: #007bff;">Camera 1</label>
                <select id="cam1Source"
                    style="width: 100%; padding: 8px; margin: 8px 0; background: #050505; color: #00ff41; border: 1px solid #333;">
                    <option value="webcam">Webcam</option>
                    <option value="mjpeg">MJPEG IP Camera</option>
                    <option value="screenshare">Screen Share</option>
                </select>
                <input id="cam1Url" type="text" placeholder="MJPEG URL (e.g., http://192.168.1.100:8080/stream)"
                    style="width: 100%; padding: 8px; margin: 8px 0; background: #050505; color: #00ff41; border: 1px solid #333; box-sizing: border-box;" />
            </div>
            <div id="cam2Config" class="cam-config">
                <label style="font-weight: bold; color: #ff4757;">Camera 2</label>
                <select id="cam2Source"
                    style="width: 100%; padding: 8px; margin: 8px 0; background: #050505; color: #00ff41; border: 1px solid #333;">
                    <option value="webcam">Webcam</option>
                    <option value="mjpeg">MJPEG IP Camera</option>
                    <option value="screenshare">Screen Share</option>
                </select>
                <input id="cam2Url" type="text" placeholder="MJPEG URL (e.g., http://192.168.1.100:8080/stream)"
                    style="width: 100%; padding: 8px; margin: 8px 0; background: #050505; color: #00ff41; border: 1px solid #333; box-sizing: border-box;" />
            </div>
            <div id="cam3Config" class="cam-config">
                <label style="font-weight: bold; color: #9b59b6;">Camera 3</label>
                <select id="cam3Source"
                    style="width: 100%; padding: 8px; margin: 8px 0; background: #050505; color: #00ff41; border: 1px solid #333;">
                    <option value="webcam">Webcam</option>
                    <option value="mjpeg">MJPEG IP Camera</option>
                    <option value="screenshare">Screen Share</option>
                </select>
                <input id="cam3Url" type="text" placeholder="MJPEG URL (e.g., http://192.168.1.100:8080/stream)"
                    style="width: 100%; padding: 8px; margin: 8px 0; background: #050505; color: #00ff41; border: 1px solid #333; box-sizing: border-box;" />
            </div>
        </div>
        <button id="startBtn" style="margin-top: 15px; width: 100%;">CONNECT CAMERAS</button>
    </div>

    <div class="main-layout" style="margin-top: 20px;">
        <div class="sidebar">
            <div class="panel">
                <h3>Intelligence Map (MJPEG Triangulation)</h3>
                <canvas id="mapCanvas" width="350" height="350"></canvas>
                <div style="display: flex; justify-content: space-between; font-size: 11px; margin-top: 10px;">
                    <span style="color: #007bff;">● Cam 1</span>
                    <span style="color: #ff4757;">● Cam 2</span>
                    <span style="color: #9b59b6;">● Cam 3</span>
                </div>
                <div style="text-align: center; margin-top: 10px; font-size: 12px;">
                    <span style="color: #f39c12; font-weight: bold;">🐟 魚公仔 (3-Cam Confirmed)</span>
                </div>
            </div>

            <div class="panel">
                <h3>Hardware Config</h3>
                <textarea id="configOutput" readonly></textarea>
            </div>
        </div>

        <div class="feeds-container">
            <div class="video-box">
                <div class="no-signal">No Signal</div>
                <img id="stream1" class="stream-source" crossorigin="anonymous" />
                <canvas id="overlay1" class="overlay"></canvas>
            </div>
            <div class="video-box">
                <div class="no-signal">No Signal</div>
                <img id="stream2" class="stream-source" crossorigin="anonymous" />
                <canvas id="overlay2" class="overlay"></canvas>
            </div>
            <div class="video-box">
                <div class="no-signal">No Signal</div>
                <img id="stream3" class="stream-source" crossorigin="anonymous" />
                <canvas id="overlay3" class="overlay"></canvas>
            </div>
        </div>
    </div>

    <script>
        let model;
        let isDragging = false;
        let selectedCam = null;
        const CAMERA_FOV = 60 * Math.PI / 180;
        const INTERSECT_THRESHOLD = 40;
        const videoStreams = {}; // Store video elements for webcam/screenshare 

        // 🌟 這裡換成你的 MJPEG 攝影機真實網址
        let cameras =
            //     { id: 1, x: 60, y: 50, angle: -45, color: '#007bff', detections: [], streamUrl: 'http://localhost:3000/stream/1' },
            //     { id: 2, x: 175, y: 50, angle: -135, color: '#ff4757', detections: [], streamUrl: 'http://localhost:3000/stream/2' },
            //     { id: 3, x: 35, y: 200, angle: 90, color: '#9b59b6', detections: [], streamUrl: 'http://localhost:3000/stream/3' }
            // ];
            [
                {
                    "id": 1,
                    "x": 57.33333206176758,
                    "y": 35.07291603088379,
                    "angle": 56.309932474020215,
                    "color": "#007bff",
                    detections: [],
                    "streamUrl": "http://localhost:3000/stream/1"
                },
                {
                    "id": 2,
                    "x": 272.3333320617676,
                    "y": 22.40625,
                    "angle": 112.16634582208246,
                    "color": "#ff4757",
                    detections: [],
                    "streamUrl": "http://localhost:3000/stream/2"
                },
                {
                    "id": 3,
                    "x": 74.33333206176758,
                    "y": 323.40625,
                    "angle": -19.79887635452493,
                    "color": "#9b59b6",
                    detections: [],
                    "streamUrl": "http://localhost:3000/stream/3"
                }
            ]

        const mCanvas = document.getElementById('mapCanvas');
        const mCtx = mCanvas.getContext('2d');
        const configOutput = document.getElementById('configOutput');

        // 1. Setup AI
        cocoSsd.load().then(lModel => {
            model = lModel;
            document.getElementById('status').innerText = "✅ AI Core Ready. Configure cameras and connect.";
        });

        // 3. Detection -> 直接處理 HTMLImageElement
        async function processCamera(imgElement, canvas, camObj) {
            // 如果圖片還沒載入完畢或是破圖，就略過這一幀
            if (!imgElement.complete || imgElement.naturalWidth === 0) {
                requestAnimationFrame(() => processCamera(imgElement, canvas, camObj));
                return;
            }

            // TF.js 直接讀取 MJPEG img 標籤的當下畫面
            const predictions = await model.detect(imgElement);
            const ctx = canvas.getContext('2d');

            // 確保 canvas 尺寸與真實串流解析度一致
            if (canvas.width !== imgElement.naturalWidth) {
                canvas.width = imgElement.naturalWidth;
                canvas.height = imgElement.naturalHeight;
            }
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            camObj.detections = [];

            predictions.forEach(p => {
                if (p.class === 'person' && p.score > 0.5) {
                    const [x, y, w, h] = p.bbox;
                    ctx.strokeStyle = camObj.color;
                    ctx.lineWidth = 3;
                    ctx.strokeRect(x, y, w, h);

                    const personCenterX = x + w / 2;
                    const offsetAngle = (personCenterX / imgElement.naturalWidth - 0.5) * CAMERA_FOV;
                    const camAngleRad = camObj.angle * Math.PI / 180;
                    const globalRayAngle = camAngleRad + offsetAngle;

                    camObj.detections.push({ angle: globalRayAngle });
                }
            });

            // 持續迴圈抓取 MJPEG 串流的新畫面
            requestAnimationFrame(() => processCamera(imgElement, canvas, camObj));
        }

        // 3b. Detection -> Handle video streams (webcam/screenshare)
        async function processWebcamCamera(videoElement, canvas, camObj) {
            if (videoElement.readyState !== videoElement.HAVE_ENOUGH_DATA) {
                requestAnimationFrame(() => processWebcamCamera(videoElement, canvas, camObj));
                return;
            }

            const ctx = canvas.getContext('2d');

            if (canvas.width !== videoElement.videoWidth) {
                canvas.width = videoElement.videoWidth;
                canvas.height = videoElement.videoHeight;
            }

            // Draw video frame to canvas first
            ctx.drawImage(videoElement, 0, 0, canvas.width, canvas.height);

            const predictions = await model.detect(canvas);

            camObj.detections = [];

            predictions.forEach(p => {
                if (p.class === 'person' && p.score > 0.5) {
                    const [x, y, w, h] = p.bbox;
                    ctx.strokeStyle = camObj.color;
                    ctx.lineWidth = 3;
                    ctx.strokeRect(x, y, w, h);

                    const personCenterX = x + w / 2;
                    const offsetAngle = (personCenterX / canvas.width - 0.5) * CAMERA_FOV;
                    const camAngleRad = camObj.angle * Math.PI / 180;
                    const globalRayAngle = camAngleRad + offsetAngle;

                    camObj.detections.push({ angle: globalRayAngle });
                }
            });

            requestAnimationFrame(() => processWebcamCamera(videoElement, canvas, camObj));
        }

        function getIntersection(cam1, det1, cam2, det2) {
            const x1 = cam1.x, y1 = cam1.y;
            const x2 = cam2.x, y2 = cam2.y;
            const a1 = det1.angle, a2 = det2.angle;
            const dx = x2 - x1, dy = y2 - y1;
            const det = Math.cos(a1) * Math.sin(a2) - Math.sin(a1) * Math.cos(a2);
            if (Math.abs(det) < 0.001) return null;
            const t1 = (dx * Math.sin(a2) - dy * Math.cos(a2)) / det;
            const t2 = (dx * Math.sin(a1) - dy * Math.cos(a1)) / det;
            if (t1 > 0 && t2 > 0) return { x: x1 + t1 * Math.cos(a1), y: y1 + t1 * Math.sin(a1) };
            return null;
        }

        function drawMap() {
            mCtx.clearRect(0, 0, mCanvas.width, mCanvas.height);
            mCtx.strokeStyle = '#eee';
            mCtx.lineWidth = 1;
            for (let i = 0; i < mCanvas.width; i += 50) {
                mCtx.beginPath(); mCtx.moveTo(i, 0); mCtx.lineTo(i, mCanvas.height); mCtx.stroke();
                mCtx.beginPath(); mCtx.moveTo(0, i); mCtx.lineTo(mCanvas.width, i); mCtx.stroke();
            }

            cameras.forEach(cam => {
                cam.detections.forEach(det => {
                    mCtx.beginPath();
                    mCtx.moveTo(cam.x, cam.y);
                    mCtx.lineTo(cam.x + 1000 * Math.cos(det.angle), cam.y + 1000 * Math.sin(det.angle));
                    mCtx.strokeStyle = cam.color + '44';
                    mCtx.lineWidth = 2;
                    mCtx.stroke();
                });
            });

            const targets = [];
            cameras[0].detections.forEach(d1 => {
                cameras[1].detections.forEach(d2 => {
                    cameras[2].detections.forEach(d3 => {
                        const p12 = getIntersection(cameras[0], d1, cameras[1], d2);
                        const p23 = getIntersection(cameras[1], d2, cameras[2], d3);
                        const p31 = getIntersection(cameras[2], d3, cameras[0], d1);

                        if (p12 && p23 && p31) {
                            const dist1 = Math.hypot(p12.x - p23.x, p12.y - p23.y);
                            const dist2 = Math.hypot(p23.x - p31.x, p23.y - p31.y);
                            const dist3 = Math.hypot(p31.x - p12.x, p31.y - p12.y);

                            if (dist1 < INTERSECT_THRESHOLD && dist2 < INTERSECT_THRESHOLD && dist3 < INTERSECT_THRESHOLD) {
                                targets.push({ x: (p12.x + p23.x + p31.x) / 3, y: (p12.y + p23.y + p31.y) / 3 });
                            }
                        }
                    });
                });
            });

            targets.forEach(p => {
                mCtx.font = "28px Arial";
                mCtx.textAlign = "center";
                mCtx.textBaseline = "middle";
                mCtx.fillText("🐟", p.x, p.y);
            });

            cameras.forEach(cam => {
                mCtx.save();
                mCtx.translate(cam.x, cam.y);
                mCtx.rotate(cam.angle * Math.PI / 180);
                mCtx.fillStyle = cam.color + '22';
                mCtx.beginPath(); mCtx.moveTo(0, 0); mCtx.arc(0, 0, 80, -CAMERA_FOV / 2, CAMERA_FOV / 2); mCtx.fill();
                mCtx.fillStyle = cam.color;
                mCtx.fillRect(-10, -6, 20, 12); mCtx.fillRect(10, -3, 4, 6);
                mCtx.restore();
            });

            requestAnimationFrame(drawMap);
        }

        // 5. Interactivity -> Handle webcam, MJPEG, and screenshare
        document.getElementById('startBtn').addEventListener('click', async () => {
            const configs = [
                { id: 1, sourceType: document.getElementById('cam1Source').value, url: document.getElementById('cam1Url').value },
                { id: 2, sourceType: document.getElementById('cam2Source').value, url: document.getElementById('cam2Url').value },
                { id: 3, sourceType: document.getElementById('cam3Source').value, url: document.getElementById('cam3Url').value }
            ];

            for (const config of configs) {
                const imgElement = document.getElementById(`stream${config.id}`);
                const canvas = document.getElementById(`overlay${config.id}`);
                const videoBox = canvas.closest('.video-box');
                const camObj = cameras[config.id - 1];

                try {
                    if (config.sourceType === 'mjpeg') {
                        // MJPEG: Direct image source
                        if (!config.url) {
                            alert(`Camera ${config.id}: Please enter MJPEG URL`);
                            return;
                        }
                        imgElement.src = config.url;
                        imgElement.style.display = 'block';
                        videoBox.classList.add('active');
                        processCamera(imgElement, canvas, camObj);
                    } else if (config.sourceType === 'webcam') {
                        // Webcam: Use getUserMedia
                        const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
                        const video = document.createElement('video');
                        video.srcObject = stream;
                        video.play();
                        videoStreams[config.id] = video;
                        imgElement.style.display = 'none';
                        videoBox.classList.add('active');
                        processWebcamCamera(video, canvas, camObj);
                    } else if (config.sourceType === 'screenshare') {
                        // Screen Share: Use getDisplayMedia
                        const stream = await navigator.mediaDevices.getDisplayMedia({ video: { cursor: 'always' } });
                        const video = document.createElement('video');
                        video.srcObject = stream;
                        video.play();
                        videoStreams[config.id] = video;
                        imgElement.style.display = 'none';
                        videoBox.classList.add('active');
                        processWebcamCamera(video, canvas, camObj);
                    }
                } catch (err) {
                    console.error(`Camera ${config.id} error:`, err);
                    document.getElementById('status').innerText = `❌ Error: ${err.message}`;
                }
            }

            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('status').innerText = "🛰️ IP SURVEILLANCE ACTIVE (3 CAMERAS)";
            drawMap();
        });

        const getMouse = (e) => {
            const r = mCanvas.getBoundingClientRect();
            return { x: e.clientX - r.left, y: e.clientY - r.top };
        };

        // Handle source type changes
        [1, 2, 3].forEach(camId => {
            const sourceSelect = document.getElementById(`cam${camId}Source`);
            const urlInput = document.getElementById(`cam${camId}Url`);

            sourceSelect.addEventListener('change', (e) => {
                urlInput.style.display = e.target.value === 'mjpeg' ? 'block' : 'none';
            });

            // Initialize visibility
            urlInput.style.display = sourceSelect.value === 'mjpeg' ? 'block' : 'none';
        });

        mCanvas.onmousedown = (e) => {
            const p = getMouse(e);
            let minDist = Infinity;
            cameras.forEach(cam => {
                const dist = Math.hypot(cam.x - p.x, cam.y - p.y);
                if (dist < minDist) {
                    minDist = dist;
                    selectedCam = cam;
                }
            });
            if (minDist < 30) {
                selectedCam.x = p.x; selectedCam.y = p.y;
                isDragging = true;
            }
        };

        mCanvas.onmousemove = (e) => {
            if (!isDragging) return;
            const p = getMouse(e);
            selectedCam.angle = Math.atan2(p.y - selectedCam.y, p.x - selectedCam.x) * 180 / Math.PI;
        };

        window.onmouseup = () => {
            if (isDragging) {
                isDragging = false;
                const clean = cameras.map(({ detections, ...rest }) => rest);
                configOutput.value = JSON.stringify(clean, null, 2);
            }
        };

        const clean = cameras.map(({ detections, ...rest }) => rest);
        configOutput.value = JSON.stringify(clean, null, 2);
        drawMap();
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Sensor Fusion: MJPEG IP Cameras</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f0f0f;
            color: #eee;
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
        }

        #mapCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            background: #1a1a1a;
            cursor: crosshair;
        }

        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 10;
            background: rgba(20, 20, 20, 0.95);
            border-bottom: 2px solid #333;
            transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            backdrop-filter: blur(10px);
            overflow: visible; /* Ensure handle is not clipped */
        }

        .ui-overlay.hidden {
            /* Move up but leave the border area */
            transform: translateY(calc(-100% + 2px)); 
        }

        .toggle-handle {
            position: absolute;
            top: 100%; /* Position at the very bottom edge of panel */
            left: 50%;
            transform: translateX(-50%);
            background: #27ae60;
            color: #fff;
            padding: 5px 40px;
            border-radius: 0 0 15px 15px;
            cursor: pointer;
            font-size: 18px;
            border: none;
            z-index: 100; /* Extremely high z-index */
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            display: block !important;
            line-height: 1;
        }

        .feeds-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
            padding: 15px;
        }

        .video-box {
            position: relative;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid #333;
            aspect-ratio: 16 / 9;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
            font-size: 11px;
        }

        .video-box .no-signal {
            position: absolute;
            z-index: 5;
            pointer-events: none;
        }

        .video-box.active .no-signal {
            display: none;
        }

        img.stream-source,
        canvas.overlay {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }

        img.stream-source {
            object-fit: contain;
        }

        canvas.overlay {
            pointer-events: auto;
            z-index: 10;
        }

        .video-box.calibrating {
            border: 4px solid #f39c12;
            box-shadow: 0 0 20px rgba(243, 156, 18, 0.5);
        }

        .panel {
            background: transparent;
            padding: 15px;
        }

        .status {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 5;
            padding: 8px 15px;
            border-radius: 20px;
            background: rgba(0,0,0,0.8);
            border: 1px solid #444;
            font-size: 0.85em;
            pointer-events: none;
        }

        .config-bar {
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
        }

        button {
            padding: 8px 16px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
            font-size: 12px;
        }

        button:hover {
            background: #2ecc71;
        }

        textarea {
            width: 300px;
            height: 60px;
            background: #050505;
            color: #00ff41;
            border: 1px solid #333;
            font-family: monospace;
            font-size: 10px;
            padding: 5px;
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 5;
            opacity: 0.7;
        }

        h3 {
            margin: 0;
            font-size: 1.1em;
            color: #aaa;
        }

        .cam-legend {
            position: absolute;
            bottom: 100px;
            left: 20px;
            z-index: 5;
            display: flex;
            flex-direction: column;
            gap: 5px;
            background: rgba(0,0,0,0.6);
            padding: 10px;
            border-radius: 8px;
            font-size: 11px;
        }
    </style>
</head>

<body>

    <canvas id="mapCanvas"></canvas>

    <div class="status" id="status">📡 System: Loading AI Core...</div>
    
    <div id="camLegend" class="cam-legend">
        <!-- Dynamic legend -->
    </div>

    <button id="copyConfigBtn" style="position: absolute; bottom: 20px; right: 20px; z-index: 5; background: #34495e; padding: 10px 20px; font-size: 11px;">📋 COPY CONFIG</button>

    <div id="uiOverlay" class="ui-overlay">
        <button id="toggleBtn" class="toggle-handle">▲</button>
        
        <div style="max-height: 85vh; overflow-y: auto;">
            <div class="config-bar">
                <h3>Intelligence Configuration</h3>
                <div>
                    <button id="importBtn" style="background: #e67e22; margin-right: 10px;">📥 IMPORT</button>
                    <button id="addCamBtn" style="background: #3498db; margin-right: 10px;">+ ADD CAMERA</button>
                    <button id="startBtn">CONNECT ALL</button>
                </div>
            </div>

            <div id="camConfigs" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; padding: 15px;">
                <!-- Dynamic camera configs -->
            </div>

            <div id="feedsContainer" class="feeds-container">
                <!-- Dynamic video boxes -->
            </div>
        </div>
    </div>

    <script>
        let model;
        let isDragging = false;
        let selectedCam = null;
        let calibrationMode = null; 
        
        const INTERSECT_THRESHOLD = 40;
        const CAM_COLORS = ['#007bff', '#ff4757', '#9b59b6', '#2ecc71', '#f1c40f', '#e67e22', '#1abc9c', '#e74c3c'];
        
        let cameras = [];
        const videoStreams = {}; 

        const mCanvas = document.getElementById('mapCanvas');
        const mCtx = mCanvas.getContext('2d');
        const configOutput = document.getElementById('configOutput');
        const camConfigs = document.getElementById('camConfigs');
        const feedsContainer = document.getElementById('feedsContainer');
        const camLegend = document.getElementById('camLegend');
        const uiOverlay = document.getElementById('uiOverlay');
        const toggleBtn = document.getElementById('toggleBtn');

        // Toggle UI
        toggleBtn.onclick = () => {
            uiOverlay.classList.toggle('hidden');
            toggleBtn.innerText = uiOverlay.classList.contains('hidden') ? '▼' : '▲';
        };

        // Resize map to viewport
        function resizeMap() {
            mCanvas.width = window.innerWidth;
            mCanvas.height = window.innerHeight;
        }
        window.onresize = resizeMap;
        resizeMap();

        // 1. Setup AI
        cocoSsd.load().then(lModel => {
            model = lModel;
            document.getElementById('status').innerText = "✅ AI Core Ready.";
        });

        function addCamera() {
            const id = cameras.length > 0 ? Math.max(...cameras.map(c => c.id)) + 1 : 1;
            const color = CAM_COLORS[(id - 1) % CAM_COLORS.length];
            
            const newCam = {
                id,
                x: window.innerWidth / 2 + (id * 40 - 80),
                y: window.innerHeight / 2 + (id * 40 - 80),
                angle: 45,
                fov: 60,
                color,
                detections: [],
                sourceType: 'webcam',
                streamUrl: '',
                active: false
            };
            
            cameras.push(newCam);
            renderCamUI(newCam);
            updateLegend();
            updateConfigOutput();
        }

        function renderCamUI(cam) {
            const card = document.createElement('div');
            card.style.background = 'rgba(255,255,255,0.05)';
            card.style.padding = '12px';
            card.style.borderRadius = '8px';
            card.id = `camCard${cam.id}`;
            card.innerHTML = `
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                    <label style="font-weight: bold; color: ${cam.color}; font-size: 13px;">Camera ${cam.id}</label>
                    <button onclick="removeCamera(${cam.id})" style="padding: 2px 8px; background: #c0392b; font-size: 9px;">DEL</button>
                </div>
                <select id="sourceType${cam.id}" onchange="updateCamSource(${cam.id})"
                    style="width: 100%; padding: 5px; background: #000; color: #00ff41; border: 1px solid #444; font-size: 11px;">
                    <option value="webcam">Webcam</option>
                    <option value="mjpeg">IP Camera (MJPEG)</option>
                    <option value="screenshare">Screen</option>
                </select>
                <input id="urlInput${cam.id}" type="text" placeholder="URL" 
                    style="display: none; width: 100%; padding: 5px; margin-top: 5px; background: #000; color: #00ff41; border: 1px solid #444; font-size: 11px;"
                    onchange="updateCamUrl(${cam.id}, this.value)" />
                <div style="margin: 8px 0;">
                    <div style="display:flex; justify-content:space-between; font-size: 10px; color: #888;">
                        <span>FOV</span><span id="fovVal${cam.id}">${cam.fov}°</span>
                    </div>
                    <input type="range" min="30" max="120" value="${cam.fov}" style="width: 100%; height: 4px;" 
                        oninput="updateCamFOV(${cam.id}, this.value)">
                </div>
                <div style="display: flex; gap: 5px;">
                    <button onclick="connectSingle(${cam.id})" style="flex: 1; padding: 4px; font-size: 10px; background: #27ae60;">CONNECT</button>
                    <button id="calibBtn${cam.id}" onclick="startCalibration(${cam.id})" style="flex: 1; padding: 4px; font-size: 10px; background: #f39c12;">CALIB</button>
                </div>
            `;
            camConfigs.appendChild(card);

            const feedBox = document.createElement('div');
            feedBox.className = 'video-box';
            feedBox.id = `feedBox${cam.id}`;
            feedBox.innerHTML = `
                <div class="no-signal">Cam ${cam.id}</div>
                <img id="stream${cam.id}" class="stream-source" crossorigin="anonymous" style="display:none" />
                <canvas id="overlay${cam.id}" class="overlay" onclick="handleFeedClick(${cam.id}, event)"></canvas>
            `;
            feedsContainer.appendChild(feedBox);
        }

        function removeCamera(id) {
            cameras = cameras.filter(c => c.id !== id);
            document.getElementById(`camCard${id}`).remove();
            document.getElementById(`feedBox${id}`).remove();
            if (videoStreams[id]) {
                videoStreams[id].getTracks().forEach(t => t.stop());
                delete videoStreams[id];
            }
            updateLegend();
            updateConfigOutput();
        }

        function updateCamSource(id) {
            const cam = cameras.find(c => c.id === id);
            const sourceType = document.getElementById(`sourceType${id}`).value;
            cam.sourceType = sourceType;
            document.getElementById(`urlInput${id}`).style.display = sourceType === 'mjpeg' ? 'block' : 'none';
        }

        function updateCamUrl(id, url) {
            const cam = cameras.find(c => c.id === id);
            cam.streamUrl = url;
        }

        function updateCamFOV(id, val) {
            const cam = cameras.find(c => c.id === id);
            cam.fov = parseInt(val);
            document.getElementById(`fovVal${id}`).innerText = val;
            updateConfigOutput();
        }

        function updateLegend() {
            camLegend.innerHTML = cameras.map(cam => `
                <span style="color: ${cam.color};">● Cam ${cam.id}</span>
            `).join('');
        }

        async function connectSingle(id) {
            const cam = cameras.find(c => c.id === id);
            const imgElement = document.getElementById(`stream${id}`);
            const canvas = document.getElementById(`overlay${id}`);
            const videoBox = document.getElementById(`feedBox${id}`);

            try {
                if (cam.sourceType === 'mjpeg') {
                    if (!cam.streamUrl) return alert("Enter URL");
                    imgElement.src = cam.streamUrl;
                    imgElement.style.display = 'block';
                    videoBox.classList.add('active');
                    processCamera(imgElement, canvas, cam);
                } else if (cam.sourceType === 'webcam') {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                    const video = document.createElement('video');
                    video.srcObject = stream;
                    video.play();
                    videoStreams[id] = stream;
                    imgElement.style.display = 'none';
                    videoBox.classList.add('active');
                    processWebcamCamera(video, canvas, cam);
                } else if (cam.sourceType === 'screenshare') {
                    const stream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                    const video = document.createElement('video');
                    video.srcObject = stream;
                    video.play();
                    videoStreams[id] = stream;
                    imgElement.style.display = 'none';
                    videoBox.classList.add('active');
                    processWebcamCamera(video, canvas, cam);
                }
                cam.active = true;
                document.getElementById('status').innerText = `✅ Cam ${id} Active`;
            } catch (err) {
                document.getElementById('status').innerText = `❌ Error: ${err.message}`;
            }
        }

        async function processCamera(imgElement, canvas, camObj) {
            if (!imgElement.complete || imgElement.naturalWidth === 0) {
                requestAnimationFrame(() => processCamera(imgElement, canvas, camObj));
                return;
            }
            const predictions = await model.detect(imgElement);
            handlePredictions(predictions, canvas, imgElement.naturalWidth, imgElement.naturalHeight, camObj);
            requestAnimationFrame(() => processCamera(imgElement, canvas, camObj));
        }

        async function processWebcamCamera(videoElement, canvas, camObj) {
            if (videoElement.readyState !== videoElement.HAVE_ENOUGH_DATA) {
                requestAnimationFrame(() => processWebcamCamera(videoElement, canvas, camObj));
                return;
            }
            const predictions = await model.detect(videoElement);
            handlePredictions(predictions, canvas, videoElement.videoWidth, videoElement.videoHeight, camObj);
            requestAnimationFrame(() => processWebcamCamera(videoElement, canvas, camObj));
        }

        function handlePredictions(predictions, canvas, width, height, camObj) {
            if (canvas.width !== width) { canvas.width = width; canvas.height = height; }
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, width, height);

            const camFOVRad = (camObj.fov || 60) * Math.PI / 180;
            camObj.detections = [];

            predictions.forEach(p => {
                if (p.class === 'person' && p.score > 0.5) {
                    const [x, y, w, h] = p.bbox;
                    ctx.strokeStyle = camObj.color;
                    ctx.lineWidth = 3;
                    ctx.strokeRect(x, y, w, h);

                    const personCenterX = x + w / 2;
                    const offsetAngle = (personCenterX / width - 0.5) * camFOVRad;
                    const camAngleRad = camObj.angle * Math.PI / 180;
                    camObj.detections.push({ angle: camAngleRad + offsetAngle });
                }
            });
        }

        function getIntersection(cam1, det1, cam2, det2) {
            const x1 = cam1.x, y1 = cam1.y, a1 = det1.angle;
            const x2 = cam2.x, y2 = cam2.y, a2 = det2.angle;
            const dx = x2 - x1, dy = y2 - y1;
            const det = Math.cos(a1) * Math.sin(a2) - Math.sin(a1) * Math.cos(a2);
            if (Math.abs(det) < 0.001) return null;
            const t1 = (dx * Math.sin(a2) - dy * Math.cos(a2)) / det;
            const t2 = (dx * Math.sin(a1) - dy * Math.cos(a1)) / det;
            if (t1 > 0 && t2 > 0) return { x: x1 + t1 * Math.cos(a1), y: y1 + t1 * Math.sin(a1) };
            return null;
        }

        function drawMap() {
            mCtx.clearRect(0, 0, mCanvas.width, mCanvas.height);
            
            // Grid
            mCtx.strokeStyle = '#222'; mCtx.lineWidth = 1;
            for (let i = 0; i < mCanvas.width; i += 100) {
                mCtx.beginPath(); mCtx.moveTo(i, 0); mCtx.lineTo(i, mCanvas.height); mCtx.stroke();
            }
            for (let i = 0; i < mCanvas.height; i += 100) {
                mCtx.beginPath(); mCtx.moveTo(0, i); mCtx.lineTo(mCanvas.width, i); mCtx.stroke();
            }

            // Rays
            cameras.forEach(cam => {
                cam.detections.forEach(det => {
                    mCtx.beginPath(); mCtx.moveTo(cam.x, cam.y);
                    mCtx.lineTo(cam.x + 2000 * Math.cos(det.angle), cam.y + 2000 * Math.sin(det.angle));
                    mCtx.strokeStyle = cam.color + '33'; mCtx.lineWidth = 1; mCtx.stroke();
                });
            });

            // Triangulation
            const targets = [];
            if (cameras.filter(c => c.detections.length > 0).length >= 2) {
                for (let i = 0; i < cameras.length; i++) {
                    for (let j = i + 1; j < cameras.length; j++) {
                        cameras[i].detections.forEach(d1 => {
                            cameras[j].detections.forEach(d2 => {
                                const p = getIntersection(cameras[i], d1, cameras[j], d2);
                                if (p) targets.push(p);
                            });
                        });
                    }
                }
            }

            targets.forEach((p, idx) => {
                const isDuplicate = targets.slice(0, idx).some(prev => Math.hypot(p.x - prev.x, p.y - prev.y) < 30);
                if (!isDuplicate) {
                    mCtx.font = "24px Arial"; mCtx.textAlign = "center";
                    mCtx.fillText("🐟", p.x, p.y);
                }
            });

            // Draw Cameras
            cameras.forEach(cam => {
                const camFOVRad = (cam.fov || 60) * Math.PI / 180;
                mCtx.save();
                mCtx.translate(cam.x, cam.y);
                mCtx.rotate(cam.angle * Math.PI / 180);
                mCtx.fillStyle = cam.color + '15';
                mCtx.beginPath(); mCtx.moveTo(0,0); mCtx.arc(0, 0, 150, -camFOVRad/2, camFOVRad/2); mCtx.fill();
                mCtx.fillStyle = cam.color;
                mCtx.fillRect(-12, -8, 24, 16); mCtx.fillRect(12, -4, 5, 8);
                if (calibrationMode && calibrationMode.camId === cam.id) {
                    mCtx.strokeStyle = "#fff"; mCtx.lineWidth = 2; mCtx.strokeRect(-15, -11, 30, 22);
                }
                mCtx.restore();
            });

            requestAnimationFrame(drawMap);
        }

        // Calibration
        function startCalibration(id) {
            calibrationMode = { camId: id, step: 'video', pixelX: null };
            document.getElementById('status').innerText = `🎯 Calibration: Click object in Video ${id}`;
            document.getElementById(`feedBox${id}`).classList.add('calibrating');
            uiOverlay.classList.add('hidden'); // Auto hide UI to show map
            toggleBtn.innerText = '▼';
        }

        function stopCalibration(id) {
            calibrationMode = null;
            document.getElementById('status').innerText = "Calibration Done.";
            document.getElementById(`feedBox${id}`).classList.remove('calibrating');
            uiOverlay.classList.remove('hidden');
            toggleBtn.innerText = '▲';
        }

        function handleFeedClick(id, event) {
            if (!calibrationMode || calibrationMode.camId !== id || calibrationMode.step !== 'video') return;
            calibrationMode.pixelX = (event.clientX - event.target.getBoundingClientRect().left) / event.target.clientWidth;
            calibrationMode.step = 'map';
            document.getElementById('status').innerText = `🎯 Calibration: Click object's REAL location on Map`;
        }

        const getMouse = (e) => ({ x: e.clientX, y: e.clientY });

        mCanvas.onmousedown = (e) => {
            const p = getMouse(e);
            if (calibrationMode && calibrationMode.step === 'map') {
                const cam = cameras.find(c => c.id === calibrationMode.camId);
                const camFOVRad = (cam.fov || 60) * Math.PI / 180;
                cam.angle = (Math.atan2(p.y - cam.y, p.x - cam.x) - (calibrationMode.pixelX - 0.5) * camFOVRad) * 180 / Math.PI;
                stopCalibration(cam.id);
                updateConfigOutput();
                return;
            }
            cameras.forEach(cam => {
                if (Math.hypot(cam.x - p.x, cam.y - p.y) < 30) selectedCam = cam;
            });
            if (selectedCam) isDragging = true;
        };

        mCanvas.onmousemove = (e) => {
            if (isDragging && selectedCam) {
                const p = getMouse(e);
                selectedCam.x = p.x; selectedCam.y = p.y;
            }
        };

        window.onmouseup = () => {
            if (isDragging) { isDragging = false; selectedCam = null; updateConfigOutput(); }
        };

        function updateConfigOutput() {
            // No longer needed as we use the copy button
        }

        document.getElementById('importBtn').onclick = () => {
            const json = prompt("Paste your camera config JSON here:");
            if (!json) return;
            try {
                const importedCams = JSON.parse(json);
                if (!Array.isArray(importedCams)) throw new Error("Invalid format");
                
                // Clear existing
                cameras.forEach(c => {
                    document.getElementById(`camCard${c.id}`)?.remove();
                    document.getElementById(`feedBox${c.id}`)?.remove();
                    if (videoStreams[c.id]) {
                        videoStreams[c.id].getTracks().forEach(t => t.stop());
                        delete videoStreams[c.id];
                    }
                });
                cameras = [];

                // Load new
                importedCams.forEach(c => {
                    const newCam = {
                        ...c,
                        detections: [],
                        active: false
                    };
                    cameras.push(newCam);
                    renderCamUI(newCam);
                });
                updateLegend();
                document.getElementById('status').innerText = "✅ Config Imported.";
            } catch (e) {
                alert("Error importing config: " + e.message);
            }
        };

        document.getElementById('copyConfigBtn').onclick = () => {
            const config = JSON.stringify(cameras.map(({ detections, active, ...rest }) => rest), null, 2);
            navigator.clipboard.writeText(config).then(() => {
                const originalText = document.getElementById('copyConfigBtn').innerText;
                document.getElementById('copyConfigBtn').innerText = '✅ COPIED!';
                setTimeout(() => {
                    document.getElementById('copyConfigBtn').innerText = originalText;
                }, 2000);
            });
        };

        document.getElementById('addCamBtn').onclick = addCamera;
        document.getElementById('startBtn').onclick = () => cameras.forEach(c => connectSingle(c.id));

        addCamera();
        drawMap();
    </script>
</body>
</html>

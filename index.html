<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Dual Cam Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .main-layout { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; width: 100%; max-width: 1400px; }
        .feeds-container { flex: 1; display: grid; grid-template-columns: 1fr; gap: 15px; min-width: 450px; }
        .video-box { position: relative; background: #000; border-radius: 12px; overflow: hidden; border: 2px solid #333; }
        video, canvas.overlay { width: 100%; height: auto; display: block; }
        canvas.overlay { position: absolute; top: 0; left: 0; pointer-events: none; }
        .map-container { flex: 0 0 360px; background: #1e1e1e; padding: 15px; border-radius: 12px; text-align: center; }
        #mapCanvas { background: #fff; border-radius: 4px; cursor: crosshair; }
        .status { margin: 10px; padding: 10px; border-radius: 5px; background: #333; font-size: 0.9em; }
        button { padding: 12px 24px; background: #27ae60; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <h1>AI Person Detection Monitor</h1>
    <div id="status" class="status">Loading AI Models...</div>
    <button id="startBtn" style="display:none;">Start Surveillance</button>

    <div class="main-layout">
        <div class="map-container">
            <h3>Camera Floor Plan</h3>
            <canvas id="mapCanvas" width="360" height="300"></canvas>
            <p class="hint">Click to place position, drag to set angle.</p>
            <div style="font-size: 0.8em; display: flex; justify-content: space-around;">
                <span style="color: #007bff;">● Cam 1</span>
                <span style="color: #ff4757;">● Cam 2</span>
            </div>
            <div style="margin-top: 15px;">
              <label style="font-size: 0.8em; color: #aaa;">Configuration JSON:</label><br>
              <textarea id="configOutput" readonly 
                  style="width: 100%; height: 100px; background: #000; color: #0f0; border: 1px solid #444; font-family: monospace; font-size: 11px; padding: 5px; margin-top: 5px;"></textarea>
              <button onclick="copyConfig()" style="margin-top: 5px; padding: 5px 10px; font-size: 12px; background: #444;">Copy to Clipboard</button>
          </div>
        </div>

        <div class="feeds-container">
            <div class="video-box" id="container1">
                <video id="video1" autoplay playsinline muted></video>
                <canvas id="overlay1" class="overlay"></canvas>
            </div>
            <div class="video-box" id="container2">
                <video id="video2" autoplay playsinline muted></video>
                <canvas id="overlay2" class="overlay"></canvas>
            </div>
        </div>
    </div>

    <script>
        let model = undefined;
        const statusDiv = document.getElementById('status');
        const startBtn = document.getElementById('startBtn');
        
        // Load the AI Model
        cocoSsd.load().then(lModel => {
            model = lModel;
            statusDiv.innerText = "AI Models Ready. Grant camera access.";
            startBtn.style.display = "block";
        });

        async function setupCamera(videoEl, deviceId) {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { deviceId: deviceId ? { exact: deviceId } : undefined, width: 640, height: 480 }
            });
            videoEl.srcObject = stream;
            return new Promise(resolve => videoEl.onloadedmetadata = () => resolve());
        }

        async function detectFrame(video, canvas) {
            const predictions = await model.detect(video);
            const ctx = canvas.getContext('2d');
            
            // Sync canvas size to video size
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            predictions.forEach(prediction => {
                if (prediction.class === 'person') {
                    const [x, y, width, height] = prediction.bbox;
                    // Bounding Box
                    ctx.strokeStyle = '#00FF00';
                    ctx.lineWidth = 4;
                    ctx.strokeRect(x, y, width, height);
                    
                    // Label
                    ctx.fillStyle = '#00FF00';
                    ctx.font = '18px Arial';
                    ctx.fillText(`PERSON ${Math.round(prediction.score * 100)}%`, x, y > 20 ? y - 10 : 20);
                }
            });

            requestAnimationFrame(() => detectFrame(video, canvas));
        }

        startBtn.addEventListener('click', async () => {
            const devices = await navigator.mediaDevices.enumerateDevices();
            const vDevices = devices.filter(d => d.kind === 'videoinput');
            
            await setupCamera(document.getElementById('video1'), vDevices[0]?.deviceId);
            if (vDevices[1]) await setupCamera(document.getElementById('video2'), vDevices[1].deviceId);
            
            detectFrame(document.getElementById('video1'), document.getElementById('overlay1'));
            detectFrame(document.getElementById('video2'), document.getElementById('overlay2'));
            
            startBtn.style.display = "none";
            statusDiv.innerText = "System Active: Detecting People...";
        });

        // --- Map Logic ---
        const canvas = document.getElementById('mapCanvas');
        const ctx = canvas.getContext('2d');
        // let cameras = [
        //     { x: 50, y: 50, angle: 0, color: '#007bff', active: true },
        //     { x: 310, y: 50, angle: 180, color: '#ff4757', active: true }
        // ];
        let cameras = [
            {
                "x": 106,
                "y": 19.02081298828125,
                "angle": 79.38034472384487,
                "color": "#007bff",
                "active": true
            },
            {
                "x": 299,
                "y": 24.02081298828125,
                "angle": 111.31791227546157,
                "color": "#ff4757",
                "active": true
            }
        ]

        let isDragging = false;
        let selectedCam = null;

        function drawMap() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw grid
            ctx.strokeStyle = '#eee';
            for(let i=0; i<canvas.width; i+=20) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke(); }
            for(let i=0; i<canvas.height; i+=20) { ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(canvas.width,i); ctx.stroke(); }

            cameras.forEach((cam, i) => {
                ctx.save();
                ctx.translate(cam.x, cam.y);
                ctx.rotate(cam.angle * Math.PI / 180);

                // Draw Field of View (FOV) cone
                ctx.fillStyle = cam.color + '33';
                ctx.beginPath();
                ctx.moveTo(0,0);
                ctx.arc(0, 0, 50, -Math.PI/4, Math.PI/4);
                ctx.fill();

                // Draw Camera Body
                ctx.fillStyle = cam.color;
                ctx.fillRect(-10, -8, 20, 16); // body
                ctx.fillRect(8, -4, 6, 8);    // lens
                
                ctx.restore();
                ctx.fillStyle = '#000';
                ctx.fillText("Cam " + (i+1), cam.x - 15, cam.y + 25);
            });
        }

        const getMousePos = (e) => {
            const rect = canvas.getBoundingClientRect();
            return { x: e.clientX - rect.left, y: e.clientY - rect.top };
        };

        canvas.onmousedown = (e) => {
            const pos = getMousePos(e);
            // Simple logic: Left side of canvas controls Cam 1, Right side controls Cam 2
            selectedCam = pos.x < canvas.width / 2 ? cameras[0] : cameras[1];
            selectedCam.x = pos.x;
            selectedCam.y = pos.y;
            isDragging = true;
            drawMap();
        };

        canvas.onmousemove = (e) => {
            if (!isDragging) return;
            const pos = getMousePos(e);
            // Calculate angle based on mouse movement away from position
            const dx = pos.x - selectedCam.x;
            const dy = pos.y - selectedCam.y;
            selectedCam.angle = Math.atan2(dy, dx) * 180 / Math.PI;
            drawMap();
        };

        window.onmouseup = () => { 
            if(isDragging) {
                isDragging = false; 
                updateConfigDisplay(); // Update the textarea when finished moving
            }
        };

        drawMap(); // Initial draw

        const configOutput = document.getElementById('configOutput');

        function updateConfigDisplay() {
            // Formats the camera array into a string for easy copy-pasting back into your code
            configOutput.value = JSON.stringify(cameras, null, 4);
        }

        function copyConfig() {
            configOutput.select();
            document.execCommand('copy');
            alert("Configuration copied!");
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Sensor Fusion: MJPEG IP Cameras</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f0f0f;
            color: #eee;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .main-layout {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
            max-width: 1600px;
        }

        .feeds-container {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
        }

        .video-box {
            position: relative;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid #333;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
            font-size: 12px;
        }

        .video-box .no-signal {
            position: absolute;
            z-index: 5;
            pointer-events: none;
        }

        .video-box.active .no-signal {
            display: none;
        }

        /* 這裡將原本的 video 樣式改給 img 使用 */
        img.stream-source,
        canvas.overlay {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }

        img.stream-source {
            object-fit: cover;
        }

        canvas.overlay {
            pointer-events: auto; /* Changed from none to allow calibration clicks */
            z-index: 10;
        }

        .video-box.calibrating {
            border: 4px solid #f39c12;
            box-shadow: 0 0 20px rgba(243, 156, 18, 0.5);
        }

        .sidebar {
            flex: 0 0 380px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .panel {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #333;
        }

        #mapCanvas {
            background: #fff;
            border-radius: 8px;
            cursor: crosshair;
            width: 100%;
            height: auto;
        }

        .status {
            margin-bottom: 20px;
            padding: 10px 20px;
            border-radius: 30px;
            background: #222;
            border: 1px solid #444;
            font-size: 0.9em;
        }

        button {
            padding: 12px 24px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        button:hover {
            background: #2ecc71;
            transform: translateY(-2px);
        }

        textarea {
            width: 100%;
            height: 100px;
            background: #050505;
            color: #00ff41;
            border: 1px solid #333;
            font-family: monospace;
            font-size: 11px;
            padding: 8px;
            box-sizing: border-box;
            margin-top: 10px;
        }

        h3 {
            margin-top: 0;
            font-size: 1.1em;
            color: #aaa;
        }
    </style>
</head>

<body>

    <div class="status" id="status">📡 System: Loading AI Core...</div>

    <div class="panel" style="margin-bottom: 20px; max-width: 1600px;">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h3>Camera Source Configuration</h3>
            <div>
                <button id="addCamBtn" style="padding: 5px 15px; font-size: 12px; background: #3498db; margin-right: 10px;">+ ADD CAMERA</button>
                <button id="startBtn" style="padding: 5px 15px; font-size: 12px; background: #27ae60;">CONNECT ALL</button>
            </div>
        </div>
        <div id="camConfigs" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; margin-top: 15px;">
            <!-- Dynamic camera configs will appear here -->
        </div>
    </div>

    <div class="main-layout" style="margin-top: 20px;">
        <div class="sidebar">
            <div class="panel">
                <h3>Intelligence Map (Triangulation)</h3>
                <canvas id="mapCanvas" width="350" height="350"></canvas>
                <div id="camLegend" style="display: flex; flex-wrap: wrap; gap: 10px; font-size: 11px; margin-top: 10px;">
                    <!-- Dynamic legend here -->
                </div>
                <div style="text-align: center; margin-top: 10px; font-size: 12px;">
                    <span style="color: #f39c12; font-weight: bold;">🐟 魚公仔 (Multi-Cam Confirmed)</span>
                </div>
            </div>

            <div class="panel">
                <h3>Hardware Config</h3>
                <textarea id="configOutput" readonly></textarea>
                <p style="font-size: 11px; color: #666; margin-top: 10px;">Drag cams on map to position. Use Calibrate mode to align azimuth.</p>
            </div>
        </div>

        <div id="feedsContainer" class="feeds-container">
            <!-- Dynamic video boxes will appear here -->
        </div>
    </div>

    <script>
        let model;
        let isDragging = false;
        let selectedCam = null;
        let calibrationMode = null; // { camId: N, step: 'video' | 'map', pixelX: null }
        
        const CAMERA_FOV = 60 * Math.PI / 180;
        const INTERSECT_THRESHOLD = 40;
        const CAM_COLORS = ['#007bff', '#ff4757', '#9b59b6', '#2ecc71', '#f1c40f', '#e67e22', '#1abc9c', '#e74c3c'];
        
        let cameras = [];
        const videoStreams = {}; 

        const mCanvas = document.getElementById('mapCanvas');
        const mCtx = mCanvas.getContext('2d');
        const configOutput = document.getElementById('configOutput');
        const camConfigs = document.getElementById('camConfigs');
        const feedsContainer = document.getElementById('feedsContainer');
        const camLegend = document.getElementById('camLegend');

        // 1. Setup AI
        cocoSsd.load().then(lModel => {
            model = lModel;
            document.getElementById('status').innerText = "✅ AI Core Ready. Add cameras to begin.";
        });

        function addCamera() {
            const id = cameras.length > 0 ? Math.max(...cameras.map(c => c.id)) + 1 : 1;
            const color = CAM_COLORS[(id - 1) % CAM_COLORS.length];
            
            const newCam = {
                id,
                x: 50 + (id * 30) % 250,
                y: 50 + (id * 30) % 250,
                angle: 45,
                fov: 60, // Default FOV in degrees
                color,
                detections: [],
                sourceType: 'webcam',
                streamUrl: '',
                active: false
            };
            
            cameras.push(newCam);
            renderCamUI(newCam);
            updateLegend();
            updateConfigOutput();
        }

        function renderCamUI(cam) {
            // 1. Config Card
            const card = document.createElement('div');
            card.className = 'panel';
            card.id = `camCard${cam.id}`;
            card.innerHTML = `
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <label style="font-weight: bold; color: ${cam.color};">Camera ${cam.id}</label>
                    <button onclick="removeCamera(${cam.id})" style="padding: 2px 8px; background: #c0392b; font-size: 10px;">REMOVE</button>
                </div>
                <select id="sourceType${cam.id}" onchange="updateCamSource(${cam.id})"
                    style="width: 100%; padding: 8px; margin: 8px 0; background: #050505; color: #00ff41; border: 1px solid #333;">
                    <option value="webcam">Webcam</option>
                    <option value="mjpeg">MJPEG IP Camera</option>
                    <option value="screenshare">Screen Share</option>
                </select>
                <input id="urlInput${cam.id}" type="text" placeholder="MJPEG URL" 
                    style="display: none; width: 100%; padding: 8px; margin: 8px 0; background: #050505; color: #00ff41; border: 1px solid #333; box-sizing: border-box;"
                    onchange="updateCamUrl(${cam.id}, this.value)" />
                
                <div style="margin: 10px 0;">
                    <label style="font-size: 11px; color: #aaa;">Field of View: <span id="fovVal${cam.id}">${cam.fov}</span>°</label>
                    <input type="range" min="30" max="120" value="${cam.fov}" 
                        style="width: 100%;" 
                        oninput="updateCamFOV(${cam.id}, this.value)">
                </div>

                <div style="display: flex; gap: 5px; margin-top: 5px;">
                    <button onclick="connectSingle(${cam.id})" style="flex: 1; padding: 5px; font-size: 11px; background: #27ae60;">CONNECT</button>
                    <button id="calibBtn${cam.id}" onclick="startCalibration(${cam.id})" style="flex: 1; padding: 5px; font-size: 11px; background: #f39c12;">CALIBRATE</button>
                </div>
            `;
            camConfigs.appendChild(card);

            // 2. Feed Box
            const feedBox = document.createElement('div');
            feedBox.className = 'video-box';
            feedBox.id = `feedBox${cam.id}`;
            feedBox.innerHTML = `
                <div class="no-signal">No Signal (Cam ${cam.id})</div>
                <img id="stream${cam.id}" class="stream-source" crossorigin="anonymous" style="display:none" />
                <canvas id="overlay${cam.id}" class="overlay" onclick="handleFeedClick(${cam.id}, event)"></canvas>
            `;
            feedsContainer.appendChild(feedBox);
        }

        function removeCamera(id) {
            cameras = cameras.filter(c => c.id !== id);
            document.getElementById(`camCard${id}`).remove();
            document.getElementById(`feedBox${id}`).remove();
            if (videoStreams[id]) {
                videoStreams[id].getTracks().forEach(t => t.stop());
                delete videoStreams[id];
            }
            updateLegend();
            updateConfigOutput();
        }

        function updateCamSource(id) {
            const cam = cameras.find(c => c.id === id);
            const sourceType = document.getElementById(`sourceType${id}`).value;
            cam.sourceType = sourceType;
            document.getElementById(`urlInput${id}`).style.display = sourceType === 'mjpeg' ? 'block' : 'none';
        }

        function updateCamUrl(id, url) {
            const cam = cameras.find(c => c.id === id);
            cam.streamUrl = url;
        }

        function updateCamFOV(id, val) {
            const cam = cameras.find(c => c.id === id);
            cam.fov = parseInt(val);
            document.getElementById(`fovVal${id}`).innerText = val;
            updateConfigOutput();
        }

        function updateLegend() {
            camLegend.innerHTML = cameras.map(cam => `
                <span style="color: ${cam.color};">● Cam ${cam.id}</span>
            `).join('');
        }

        async function connectSingle(id) {
            const cam = cameras.find(c => c.id === id);
            const imgElement = document.getElementById(`stream${id}`);
            const canvas = document.getElementById(`overlay${id}`);
            const videoBox = document.getElementById(`feedBox${id}`);

            try {
                if (cam.sourceType === 'mjpeg') {
                    if (!cam.streamUrl) return alert("Please enter MJPEG URL");
                    imgElement.src = cam.streamUrl;
                    imgElement.style.display = 'block';
                    videoBox.classList.add('active');
                    processCamera(imgElement, canvas, cam);
                } else if (cam.sourceType === 'webcam') {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
                    const video = document.createElement('video');
                    video.srcObject = stream;
                    video.play();
                    videoStreams[id] = stream;
                    imgElement.style.display = 'none';
                    videoBox.classList.add('active');
                    processWebcamCamera(video, canvas, cam);
                } else if (cam.sourceType === 'screenshare') {
                    const stream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                    const video = document.createElement('video');
                    video.srcObject = stream;
                    video.play();
                    videoStreams[id] = stream;
                    imgElement.style.display = 'none';
                    videoBox.classList.add('active');
                    processWebcamCamera(video, canvas, cam);
                }
                cam.active = true;
                document.getElementById('status').innerText = `✅ Camera ${id} Connected`;
            } catch (err) {
                console.error(err);
                document.getElementById('status').innerText = `❌ Error connecting Cam ${id}: ${err.message}`;
            }
        }

        async function processCamera(imgElement, canvas, camObj) {
            if (!imgElement.complete || imgElement.naturalWidth === 0) {
                requestAnimationFrame(() => processCamera(imgElement, canvas, camObj));
                return;
            }
            const predictions = await model.detect(imgElement);
            handlePredictions(predictions, canvas, imgElement.naturalWidth, imgElement.naturalHeight, camObj);
            requestAnimationFrame(() => processCamera(imgElement, canvas, camObj));
        }

        async function processWebcamCamera(videoElement, canvas, camObj) {
            if (videoElement.readyState !== videoElement.HAVE_ENOUGH_DATA) {
                requestAnimationFrame(() => processWebcamCamera(videoElement, canvas, camObj));
                return;
            }
            if (canvas.width !== videoElement.videoWidth) {
                canvas.width = videoElement.videoWidth;
                canvas.height = videoElement.videoHeight;
            }
            const ctx = canvas.getContext('2d');
            ctx.drawImage(videoElement, 0, 0, canvas.width, canvas.height);
            const predictions = await model.detect(canvas);
            handlePredictions(predictions, canvas, canvas.width, canvas.height, camObj);
            requestAnimationFrame(() => processWebcamCamera(videoElement, canvas, camObj));
        }

        function handlePredictions(predictions, canvas, width, height, camObj) {
            const ctx = canvas.getContext('2d');
            if (canvas.width !== width) {
                canvas.width = width;
                canvas.height = height;
            }
            // Clear only if it's MJPEG (webcam draws over itself)
            if (camObj.sourceType === 'mjpeg') ctx.clearRect(0, 0, canvas.width, canvas.height);

            const camFOVRad = (camObj.fov || 60) * Math.PI / 180;

            camObj.detections = [];
            predictions.forEach(p => {
                if (p.class === 'person' && p.score > 0.5) {
                    const [x, y, w, h] = p.bbox;
                    ctx.strokeStyle = camObj.color;
                    ctx.lineWidth = 3;
                    ctx.strokeRect(x, y, w, h);

                    const personCenterX = x + w / 2;
                    const offsetAngle = (personCenterX / width - 0.5) * camFOVRad;
                    const camAngleRad = camObj.angle * Math.PI / 180;
                    camObj.detections.push({ angle: camAngleRad + offsetAngle });
                }
            });
        }

        function getIntersection(cam1, det1, cam2, det2) {
            const x1 = cam1.x, y1 = cam1.y, a1 = det1.angle;
            const x2 = cam2.x, y2 = cam2.y, a2 = det2.angle;
            const dx = x2 - x1, dy = y2 - y1;
            const det = Math.cos(a1) * Math.sin(a2) - Math.sin(a1) * Math.cos(a2);
            if (Math.abs(det) < 0.001) return null;
            const t1 = (dx * Math.sin(a2) - dy * Math.cos(a2)) / det;
            const t2 = (dx * Math.sin(a1) - dy * Math.cos(a1)) / det;
            if (t1 > 0 && t2 > 0) return { x: x1 + t1 * Math.cos(a1), y: y1 + t1 * Math.sin(a1) };
            return null;
        }

        function drawMap() {
            mCtx.clearRect(0, 0, mCanvas.width, mCanvas.height);
            
            // Grid
            mCtx.strokeStyle = '#eee'; mCtx.lineWidth = 1;
            for (let i = 0; i < mCanvas.width; i += 50) {
                mCtx.beginPath(); mCtx.moveTo(i, 0); mCtx.lineTo(i, mCanvas.height); mCtx.stroke();
                mCtx.beginPath(); mCtx.moveTo(0, i); mCtx.lineTo(mCanvas.width, i); mCtx.stroke();
            }

            // Rays
            cameras.forEach(cam => {
                cam.detections.forEach(det => {
                    mCtx.beginPath(); mCtx.moveTo(cam.x, cam.y);
                    mCtx.lineTo(cam.x + 1000 * Math.cos(det.angle), cam.y + 1000 * Math.sin(det.angle));
                    mCtx.strokeStyle = cam.color + '44'; mCtx.lineWidth = 2; mCtx.stroke();
                });
            });

            // Triangulation (N cameras)
            const targets = [];
            if (cameras.filter(c => c.detections.length > 0).length >= 2) {
                // Simplified multi-cam intersection: check pairs
                for (let i = 0; i < cameras.length; i++) {
                    for (let j = i + 1; j < cameras.length; j++) {
                        cameras[i].detections.forEach(d1 => {
                            cameras[j].detections.forEach(d2 => {
                                const p = getIntersection(cameras[i], d1, cameras[j], d2);
                                if (p) {
                                    // If we have 3 or more cameras, look for tight clusters
                                    let confirmedCount = 2;
                                    for (let k = 0; k < cameras.length; k++) {
                                        if (k === i || k === j) continue;
                                        cameras[k].detections.forEach(d3 => {
                                            const p13 = getIntersection(cameras[i], d1, cameras[k], d3);
                                            if (p13 && Math.hypot(p.x - p13.x, p.y - p13.y) < INTERSECT_THRESHOLD) {
                                                confirmedCount++;
                                            }
                                        });
                                    }
                                    if (confirmedCount >= Math.min(cameras.length, 3)) {
                                        targets.push(p);
                                    }
                                }
                            });
                        });
                    }
                }
            }

            // Draw targets (deduplicate)
            targets.forEach((p, idx) => {
                const isDuplicate = targets.slice(0, idx).some(prev => Math.hypot(p.x - prev.x, p.y - prev.y) < 20);
                if (!isDuplicate) {
                    mCtx.font = "24px Arial"; mCtx.textAlign = "center"; mCtx.textBaseline = "middle";
                    mCtx.fillText("🐟", p.x, p.y);
                }
            });

            // Draw Cameras
            cameras.forEach(cam => {
                const camFOVRad = (cam.fov || 60) * Math.PI / 180;
                mCtx.save();
                mCtx.translate(cam.x, cam.y);
                mCtx.rotate(cam.angle * Math.PI / 180);
                
                // FOV
                mCtx.fillStyle = cam.color + '22';
                mCtx.beginPath(); mCtx.moveTo(0,0); mCtx.arc(0, 0, 80, -camFOVRad/2, camFOVRad/2); mCtx.fill();
                
                // Icon
                mCtx.fillStyle = cam.color;
                mCtx.fillRect(-10, -6, 20, 12); mCtx.fillRect(10, -3, 4, 6);
                
                // Calibration indicator
                if (calibrationMode && calibrationMode.camId === cam.id) {
                    mCtx.strokeStyle = "#fff"; mCtx.lineWidth = 2;
                    mCtx.strokeRect(-12, -8, 24, 16);
                }
                
                mCtx.restore();
                mCtx.fillStyle = "#fff"; mCtx.font = "10px sans-serif";
                mCtx.fillText(`Cam ${cam.id}`, cam.x, cam.y + 20);
            });

            requestAnimationFrame(drawMap);
        }

        // --- Calibration Logic ---
        function startCalibration(id) {
            calibrationMode = { camId: id, step: 'video', pixelX: null };
            document.getElementById('status').innerText = `🎯 Calibration: Click the object in the Video Feed for Cam ${id}`;
            const btn = document.getElementById(`calibBtn${id}`);
            btn.innerText = "CANCEL";
            btn.style.background = "#c0392b";
            btn.onclick = () => stopCalibration(id);
            
            // Add visual highlight
            document.getElementById(`feedBox${id}`).classList.add('calibrating');
        }

        function stopCalibration(id) {
            calibrationMode = null;
            document.getElementById('status').innerText = "Calibration complete or cancelled.";
            const btn = document.getElementById(`calibBtn${id}`);
            btn.innerText = "CALIBRATE";
            btn.style.background = "#f39c12";
            btn.onclick = () => startCalibration(id);

            // Remove visual highlight
            document.getElementById(`feedBox${id}`).classList.remove('calibrating');
        }

        function handleFeedClick(id, event) {
            if (!calibrationMode || calibrationMode.camId !== id || calibrationMode.step !== 'video') return;
            
            const rect = event.target.getBoundingClientRect();
            const x = event.clientX - rect.left;
            const width = rect.width;
            
            calibrationMode.pixelX = x / width;
            calibrationMode.step = 'map';
            document.getElementById('status').innerText = `🎯 Calibration: Now click the object's REAL location on the Map`;
        }

        // --- Mouse Events ---
        const getMouse = (e) => {
            const r = mCanvas.getBoundingClientRect();
            return { x: (e.clientX - r.left) * (mCanvas.width / r.width), y: (e.clientY - r.top) * (mCanvas.height / r.height) };
        };

        mCanvas.onmousedown = (e) => {
            const p = getMouse(e);
            
            if (calibrationMode && calibrationMode.step === 'map') {
                const cam = cameras.find(c => c.id === calibrationMode.camId);
                const camFOVRad = (cam.fov || 60) * Math.PI / 180;
                const targetAzimuth = Math.atan2(p.y - cam.y, p.x - cam.x);
                const pixelOffsetAngle = (calibrationMode.pixelX - 0.5) * camFOVRad;
                cam.angle = (targetAzimuth - pixelOffsetAngle) * 180 / Math.PI;
                stopCalibration(cam.id);
                updateConfigOutput();
                return;
            }

            let minDist = Infinity;
            cameras.forEach(cam => {
                const dist = Math.hypot(cam.x - p.x, cam.y - p.y);
                if (dist < 30 && dist < minDist) {
                    minDist = dist;
                    selectedCam = cam;
                }
            });
            if (selectedCam) isDragging = true;
        };

        mCanvas.onmousemove = (e) => {
            if (!isDragging || !selectedCam) return;
            const p = getMouse(e);
            selectedCam.x = p.x;
            selectedCam.y = p.y;
        };

        window.onmouseup = () => {
            if (isDragging) {
                isDragging = false;
                selectedCam = null;
                updateConfigOutput();
            }
        };

        function updateConfigOutput() {
            const clean = cameras.map(({ detections, ...rest }) => rest);
            configOutput.value = JSON.stringify(clean, null, 2);
        }

        document.getElementById('addCamBtn').onclick = addCamera;
        document.getElementById('startBtn').onclick = () => {
            cameras.forEach(c => connectSingle(c.id));
        };

        // Initialize with one camera
        addCamera();
        drawMap();
    </script>
</body>

</html>
